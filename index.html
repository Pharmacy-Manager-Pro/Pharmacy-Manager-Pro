<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pharmacy Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #059669; border-top: 3px solid #059669; }
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans">

    <div id="app" class="max-w-md mx-auto bg-white min-h-screen pb-24 shadow-xl relative overflow-hidden flex flex-col">
        
        <main id="content" class="flex-1 overflow-y-auto p-4 hide-scroll">
            </main>

        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t flex justify-around items-center py-2 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] z-50">
            <button onclick="renderDashboard()" class="nav-item p-2 flex flex-col items-center text-gray-400">
                <i class="fas fa-th-large"></i><span class="text-xs">Home</span>
            </button>
            <button onclick="renderInventory()" class="nav-item p-2 flex flex-col items-center text-gray-400">
                <i class="fas fa-pills"></i><span class="text-xs">Items</span>
            </button>
            <button onclick="renderSalesEntry()" class="nav-item p-2 flex flex-col items-center text-gray-400">
                <i class="fas fa-cart-plus"></i><span class="text-xs">Sale</span>
            </button>
            <button onclick="renderCustomers()" class="nav-item p-2 flex flex-col items-center text-gray-400">
                <i class="fas fa-users"></i><span class="text-xs">Customers</span>
            </button>
            <button onclick="renderReports()" class="nav-item p-2 flex flex-col items-center text-gray-400">
                <i class="fas fa-chart-line"></i><span class="text-xs">Report</span>
            </button>
        </nav>
    </div>

    <script>
        // --- DATA PERSISTENCE ---
        let inventory = JSON.parse(localStorage.getItem('pharma_inv')) || [];
        let sales = JSON.parse(localStorage.getItem('pharma_sales')) || [];
        let customers = JSON.parse(localStorage.getItem('pharma_cust')) || [];

        function saveData() {
            localStorage.setItem('pharma_inv', JSON.stringify(inventory));
            localStorage.setItem('pharma_sales', JSON.stringify(sales));
            localStorage.setItem('pharma_cust', JSON.stringify(customers));
        }

        // --- NAVIGATION LOGIC ---
        const content = document.getElementById('content');

        // --- DASHBOARD ---
        function renderDashboard() {
            const lowStock = inventory.filter(m => m.qty < 10);
            const today = new Date().toISOString().split('T')[0];
            const todaySales = sales.filter(s => s.date === today).reduce((acc, s) => acc + s.total, 0);

            content.innerHTML = `
                <h1 class="text-2xl font-bold text-emerald-800 mb-4">Dashboard</h1>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                        <p class="text-xs text-emerald-600 font-bold uppercase">Total Items</p>
                        <p class="text-2xl font-black">${inventory.length}</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <p class="text-xs text-blue-600 font-bold uppercase">Today's Sale</p>
                        <p class="text-2xl font-black">₹${todaySales}</p>
                    </div>
                </div>
                
                ${lowStock.length > 0 ? `
                <div class="bg-red-50 p-4 rounded-xl border border-red-200 mb-4">
                    <div class="flex items-center text-red-700 mb-1">
                        <i class="fas fa-exclamation-triangle mr-2"></i>
                        <span class="font-bold uppercase text-xs">Stock khatam hone wala hai</span>
                    </div>
                    <p class="text-sm">${lowStock.length} medicines are below 10 units.</p>
                </div>` : ''}
            `;
        }

        // --- SALES ENTRY (Multi-medicine, Optional Customer) ---
        let currentSaleItems = [{ medId: '', qty: 1 }];

        function renderSalesEntry() {
            content.innerHTML = `
                <h2 class="text-xl font-bold mb-4">New Sale</h2>
                <div class="space-y-3 bg-gray-50 p-4 rounded-lg mb-4">
                    <input id="sCustName" onkeyup="autoFillMobile(this.value)" placeholder="Customer Name (Optional)" class="w-full p-3 border rounded-lg">
                    <input id="sCustMobile" placeholder="Mobile Number (Optional)" class="w-full p-3 border rounded-lg">
                    <input id="sCustAddress" placeholder="Address (Optional)" class="w-full p-3 border rounded-lg">
                </div>
                
                <div id="saleItemsList" class="space-y-2"></div>
                <button onclick="addSaleRow()" class="mt-2 text-emerald-600 font-bold">+ Add Item</button>

                <div class="mt-6 border-t pt-4">
                    <select id="sPayment" class="w-full p-3 border rounded-lg mb-4">
                        <option value="Cash">Cash Payment</option>
                        <option value="Online">Online Payment</option>
                    </select>
                    <button onclick="processSale()" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold">Complete Sale</button>
                </div>
            `;
            updateSaleRows();
        }

        function autoFillMobile(name) {
            const cust = customers.find(c => c.name.toLowerCase() === name.toLowerCase());
            if(cust) {
                document.getElementById('sCustMobile').value = cust.mobile;
                document.getElementById('sCustAddress').value = cust.address;
            }
        }

        function addSaleRow() {
            currentSaleItems.push({ medId: '', qty: 1 });
            updateSaleRows();
        }

        function updateSaleRows() {
            const list = document.getElementById('saleItemsList');
            list.innerHTML = currentSaleItems.map((item, idx) => `
                <div class="flex gap-2">
                    <select onchange="currentSaleItems[${idx}].medId = this.value" class="flex-1 border p-2 rounded">
                        <option>Select Medicine</option>
                        ${inventory.map(m => `<option value="${m.id}">${m.name} (Qty: ${m.qty})</option>`)}
                    </select>
                    <input type="number" value="${item.qty}" onchange="currentSaleItems[${idx}].qty = this.value" class="w-16 border p-2 rounded">
                </div>
            `).join('');
        }

        function processSale() {
            let total = 0;
            const itemsSold = [];
            currentSaleItems.forEach(si => {
                const med = inventory.find(m => m.id == si.medId);
                if(med) {
                    med.qty -= parseInt(si.qty);
                    total += (med.rate * si.qty);
                    itemsSold.push({ name: med.name, qty: si.qty, rate: med.rate });
                }
            });

            const saleData = {
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                customer: document.getElementById('sCustName').value || "Guest",
                mobile: document.getElementById('sCustMobile').value || "N/A",
                address: document.getElementById('sCustAddress').value || "",
                items: itemsSold,
                total: total,
                payment: document.getElementById('sPayment').value
            };

            sales.push(saleData);
            
            // Update/Add Customer
            if(saleData.customer !== "Guest") {
                if(!customers.find(c => c.name === saleData.customer)) {
                    customers.push({ name: saleData.customer, mobile: saleData.mobile, address: saleData.address });
                }
            }

            saveData();
            alert("Sale Saved!");
            currentSaleItems = [{ medId: '', qty: 1 }];
            renderDashboard();
        }

        // --- MONTHLY REPORTS ---
        function renderReports() {
            const monthlyData = {};
            sales.forEach(s => {
                const day = s.date;
                if(!monthlyData[day]) monthlyData[day] = { cash: 0, online: 0, total: 0 };
                if(s.payment === 'Cash') monthlyData[day].cash += s.total;
                else monthlyData[day].online += s.total;
                monthlyData[day].total += s.total;
            });

            content.innerHTML = `
                <h2 class="text-xl font-bold mb-4">Sales Report</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse bg-white shadow-sm rounded-lg overflow-hidden">
                        <thead class="bg-gray-100 text-xs font-bold uppercase">
                            <tr>
                                <th class="p-3">Date</th>
                                <th class="p-3">Cash</th>
                                <th class="p-3">Online</th>
                                <th class="p-3">Total</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm">
                            ${Object.keys(monthlyData).reverse().map(date => `
                                <tr class="border-t">
                                    <td class="p-3">${date}</td>
                                    <td class="p-3 text-emerald-600">₹${monthlyData[date].cash}</td>
                                    <td class="p-3 text-blue-600">₹${monthlyData[date].online}</td>
                                    <td class="p-3 font-bold">₹${monthlyData[date].total}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // --- INVENTORY ---
        function renderInventory() {
            content.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Inventory</h2>
                    <button onclick="showAddMed()" class="bg-emerald-600 text-white px-3 py-1 rounded-lg text-sm">+ Add New</button>
                </div>
                <div id="medList" class="space-y-3">
                    ${inventory.map(m => {
                        const isExpiredSoon = new Date(m.expiry) < new Date(new Date().setMonth(new Date().getMonth() + 6));
                        return `
                        <div class="bg-white p-4 rounded-xl border shadow-sm ${m.qty < 10 ? 'border-red-300 bg-red-50' : ''}">
                            <div class="flex justify-between">
                                <h3 class="font-bold text-lg">${m.name}</h3>
                                <div class="space-x-2">
                                    <button onclick="editMed(${m.id})" class="text-blue-500"><i class="fas fa-edit"></i></button>
                                    <button onclick="deleteMed(${m.id})" class="text-red-500"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                            <p class="text-xs text-gray-500">Comp: ${m.composition || 'N/A'}</p>
                            <div class="flex justify-between mt-2 text-sm">
                                <span>Qty: <b class="${m.qty < 10 ? 'text-red-600' : ''}">${m.qty}</b></span>
                                <span>Rate: ₹${m.rate}</span>
                                <span class="${isExpiredSoon ? 'text-amber-600 font-bold' : ''}">Exp: ${m.expiry}</span>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            `;
        }

        function showAddMed() {
            const name = prompt("Medicine Name:");
            if(!name) return;
            const composition = prompt("Composition:");
            const qty = prompt("Quantity:");
            const rate = prompt("Rate per unit:");
            const expiry = prompt("Expiry Date (YYYY-MM-DD):");
            
            inventory.push({ id: Date.now(), name, composition, qty: parseInt(qty), rate: parseFloat(rate), expiry });
            saveData();
            renderInventory();
        }

        // Initial Load
        renderDashboard();
    </script>
</body>
</html>
