<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pharmacy Manager Pro - V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            background-color: #F3F8F5; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-nav { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
        }

        .active-tab { color: #065F46; }
        .active-tab i { 
            color: #065F46; 
            background: #D1FAE5; 
            padding: 10px; 
            border-radius: 14px; 
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.1);
        }

        .card-shadow { box-shadow: 0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        
        input:focus, select:focus {
            ring: 2px;
            ring-color: #10b981;
            outline: none;
        }

        .btn-animate:active { transform: scale(0.96); }
        
        .tab-content-enter {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="text-slate-800">
    <div id="app" class="max-w-md mx-auto min-h-screen pb-28 relative">
        
        <header class="p-5 flex justify-between items-center bg-white sticky top-0 z-40 border-b border-slate-100">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-800 p-2.5 rounded-xl text-white shadow-lg shadow-emerald-200">
                    <i class="fas fa-prescription-bottle-medical text-lg"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg leading-none text-emerald-950">Pharmacy Pro</h1>
                    <p class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest mt-1">Management System</p>
                </div>
            </div>
            <button onclick="location.reload()" class="w-10 h-10 flex items-center justify-center rounded-full text-slate-400 hover:bg-slate-50 transition-all">
                <i class="fas fa-rotate"></i>
            </button>
        </header>

        <main id="main-content" class="p-4 space-y-5 hide-scroll tab-content-enter"></main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md glass-nav border-t border-slate-100 flex justify-around py-3 px-4 z-50 rounded-t-3xl shadow-2xl">
            <button onclick="renderDashboard()" class="nav-btn flex flex-col items-center gap-1.5 text-slate-400 transition-all" id="nav-dash">
                <i class="fas fa-th-large text-lg"></i><span class="text-[10px] font-bold">Dashboard</span>
            </button>
            <button onclick="renderInventory()" class="nav-btn flex flex-col items-center gap-1.5 text-slate-400 transition-all" id="nav-inv">
                <i class="fas fa-box-archive text-lg"></i><span class="text-[10px] font-bold">Inventory</span>
            </button>
            <button onclick="renderSales()" class="nav-btn flex flex-col items-center gap-1.5 text-slate-400 transition-all" id="nav-sales">
                <i class="fas fa-cash-register text-lg"></i><span class="text-[10px] font-bold">Billing</span>
            </button>
            <button onclick="renderCustomers()" class="nav-btn flex flex-col items-center gap-1.5 text-slate-400 transition-all" id="nav-cust">
                <i class="fas fa-users text-lg"></i><span class="text-[10px] font-bold">Directory</span>
            </button>
            <button onclick="renderReports()" class="nav-btn flex flex-col items-center gap-1.5 text-slate-400 transition-all" id="nav-rep">
                <i class="fas fa-chart-pie text-lg"></i><span class="text-[10px] font-bold">Reports</span>
            </button>
        </nav>
    </div>

<script>
    /* -----------------------------------------------------------
       1. DATA INITIALIZATION & LOCAL STORAGE
    ----------------------------------------------------------- */
    let inventory = JSON.parse(localStorage.getItem('pharma_pro_inv')) || [
        {id: 1, name: 'Paracetamol 500mg', composition: 'Acetaminophen', qty: 150, cost: 1.20, rate: 2.50, expiry: '2028-05-20'},
        {id: 2, name: 'Amoxicillin 250mg', composition: 'Antibiotic', qty: 8, cost: 5.00, rate: 12.00, expiry: '2026-10-15'}
    ];
    let sales = JSON.parse(localStorage.getItem('pharma_pro_sales')) || [];
    let expenses = JSON.parse(localStorage.getItem('pharma_pro_exp')) || [];
    let cart = [];

    const syncDB = () => {
        localStorage.setItem('pharma_pro_inv', JSON.stringify(inventory));
        localStorage.setItem('pharma_pro_sales', JSON.stringify(sales));
        localStorage.setItem('pharma_pro_exp', JSON.stringify(expenses));
    };

    const setTabActive = (id) => {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-tab'));
        const active = document.getElementById(id);
        if(active) active.classList.add('active-tab');
        window.scrollTo(0,0);
    };

    /* -----------------------------------------------------------
       2. DASHBOARD LOGIC
    ----------------------------------------------------------- */
    function renderDashboard() {
        setTabActive('nav-dash');
        const todayStr = new Date().toISOString().split('T')[0];
        const todaySales = sales.filter(s => s.date === todayStr).reduce((acc, s) => acc + s.total, 0);
        const lowStock = inventory.filter(m => m.qty < 15);
        const expired = inventory.filter(m => new Date(m.expiry) <= new Date());

        document.getElementById('main-content').innerHTML = `
            ${lowStock.length > 0 ? `
            <div class="bg-amber-50 border border-amber-100 p-4 rounded-2xl flex gap-4 items-start">
                <div class="bg-amber-100 text-amber-600 w-10 h-10 rounded-full flex flex-shrink-0 items-center justify-center">
                    <i class="fas fa-triangle-exclamation"></i>
                </div>
                <div>
                    <h4 class="font-bold text-amber-900 text-sm">Action Required</h4>
                    <p class="text-xs text-amber-700 leading-relaxed">${lowStock.length} medicines are running low. Please restock soon.</p>
                </div>
            </div>` : ''}

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-3xl card-shadow border border-slate-50">
                    <div class="bg-emerald-50 text-emerald-600 w-9 h-9 rounded-xl flex items-center justify-center mb-3">
                        <i class="fas fa-pills"></i>
                    </div>
                    <p class="text-3xl font-black text-slate-800">${inventory.length}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Inventory Items</p>
                </div>
                <div class="bg-white p-5 rounded-3xl card-shadow border border-slate-50">
                    <div class="bg-blue-50 text-blue-600 w-9 h-9 rounded-xl flex items-center justify-center mb-3">
                        <i class="fas fa-indian-rupee-sign"></i>
                    </div>
                    <p class="text-3xl font-black text-slate-800">₹${todaySales.toFixed(0)}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Today's Sales</p>
                </div>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center px-1">
                    <h3 class="font-bold text-slate-700">Priority Alerts</h3>
                    <span class="text-[10px] font-black text-emerald-700 bg-emerald-50 px-2 py-1 rounded-md">LIVE VIEW</span>
                </div>
                
                ${lowStock.length === 0 ? '<p class="text-xs text-slate-400 text-center py-5 italic">All stock levels are optimal.</p>' : 
                  lowStock.slice(0, 4).map(m => `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between transition-all hover:border-emerald-200">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-slate-400">
                                <i class="fas fa-box-open text-sm"></i>
                            </div>
                            <div>
                                <p class="font-bold text-sm text-slate-800">${m.name}</p>
                                <p class="text-[10px] text-slate-400 font-medium tracking-tight">Exp: ${m.expiry}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black ${m.qty < 5 ? 'text-rose-600' : 'text-amber-500'}">${m.qty} Units</p>
                            <span class="text-[9px] font-bold uppercase px-1.5 py-0.5 rounded bg-slate-100 text-slate-500">Low Stock</span>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    /* -----------------------------------------------------------
       3. SALES & BILLING LOGIC (UI FIX + STOCK VALIDATION)
    ----------------------------------------------------------- */
    function renderSales() {
        setTabActive('nav-sales');
        document.getElementById('main-content').innerHTML = `
            <div class="bg-white p-5 rounded-3xl card-shadow border border-slate-50 space-y-4">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fas fa-user-circle text-emerald-800 text-lg"></i>
                    <h3 class="font-black text-emerald-950 uppercase text-xs tracking-widest">Customer Details</h3>
                </div>
                <div class="space-y-3">
                    <input id="cName" placeholder="Full Name" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm font-medium placeholder:text-slate-300">
                    <input id="cMob" type="number" placeholder="Mobile Number" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm font-medium placeholder:text-slate-300">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Billing Date</p>
                        <input id="saleDate" type="date" value="${new Date().toISOString().split('T')[0]}" class="bg-transparent font-bold text-sm outline-none w-full">
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Payment</p>
                        <select id="payMode" class="bg-transparent font-bold text-sm outline-none w-full appearance-none">
                            <option value="Cash">Cash Pay</option>
                            <option value="Online">UPI / Card</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl card-shadow border border-slate-50">
                <div class="flex items-center justify-between mb-5" id="cartHeaderLabel">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-cart-shopping text-emerald-800"></i>
                        <h3 class="font-black text-emerald-950 uppercase text-xs tracking-widest">Medicine Cart</h3>
                    </div>
                    <span id="cartCount" class="bg-emerald-100 text-emerald-700 text-[10px] font-extrabold px-3 py-1 rounded-full">0 ITEMS</span>
                </div>

                <div class="flex gap-2 mb-6">
                    <select id="medSelect" class="flex-1 bg-slate-50 p-4 rounded-2xl text-sm border-none font-bold">
                        <option value="">Choose Medicine</option>
                        ${inventory.filter(m => m.qty > 0).map(m => `<option value="${m.id}">${m.name} [Stk: ${m.qty}]</option>`).join('')}
                    </select>
                    <input id="medQty" type="number" placeholder="Qty" class="w-20 bg-slate-50 p-4 rounded-2xl text-sm font-bold border-none text-center">
                    <button onclick="addToCart()" class="bg-emerald-800 text-white w-14 rounded-2xl btn-animate shadow-lg shadow-emerald-100">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>

                <div id="cartItems" class="space-y-1 min-h-[100px]">
                    </div>

                <div class="mt-6 pt-6 border-t border-slate-50">
                    <div class="bg-emerald-800 p-5 rounded-2xl flex justify-between items-center text-white shadow-xl shadow-emerald-100">
                        <div>
                            <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Grand Total</p>
                            <h2 class="text-2xl font-black" id="totalAmt">₹0.00</h2>
                        </div>
                        <i class="fas fa-receipt text-3xl opacity-20"></i>
                    </div>
                </div>

                <button onclick="confirmSale()" class="w-full bg-emerald-950 text-white p-5 rounded-2xl mt-5 font-black uppercase text-xs tracking-widest btn-animate flex items-center justify-center gap-3">
                    <i class="fas fa-check-double text-lg"></i> Complete Billing
                </button>
            </div>
        `;
        updateCartUI();
    }

    /* --- ADD TO CART (WITH STRICT STOCK CHECK) --- */
    function addToCart() {
        const mid = document.getElementById('medSelect').value;
        const qtyVal = parseInt(document.getElementById('medQty').value);
        const med = inventory.find(m => m.id == mid);

        if(!med) return alert("Please select a medicine.");
        if(!qtyVal || qtyVal <= 0) return alert("Enter a valid quantity.");

        // Check current qty already in cart
        const existingInCart = cart.find(item => item.id == mid);
        const totalRequested = (existingInCart ? existingInCart.qty : 0) + qtyVal;

        // Validation against Inventory
        if(totalRequested > med.qty) {
            alert(`Oops! Total order exceeds available stock.\nMedicine: ${med.name}\nAvailable Stock: ${med.qty}\nRequested: ${totalRequested}`);
            return;
        }

        if(existingInCart) {
            existingInCart.qty += qtyVal;
            existingInCart.total = existingInCart.qty * existingInCart.rate;
        } else {
            cart.push({
                id: med.id,
                name: med.name,
                qty: qtyVal,
                rate: med.rate,
                total: med.rate * qtyVal
            });
        }

        document.getElementById('medQty').value = "";
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        const countLabel = document.getElementById('cartCount');
        const totalLabel = document.getElementById('totalAmt');
        
        if(cart.length === 0) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-10 text-slate-300">
                    <i class="fas fa-basket-shopping text-4xl mb-3 opacity-20"></i>
                    <p class="text-xs font-bold uppercase tracking-tight">Cart is Empty</p>
                </div>`;
            countLabel.innerText = "0 ITEMS";
            totalLabel.innerText = "₹0.00";
            return;
        }

        container.innerHTML = `
            <div class="grid grid-cols-3 px-2 mb-3">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Medicine</span>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Qty</span>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Subtotal</span>
            </div>
            ${cart.map((item, idx) => `
                <div class="bg-slate-50/50 p-4 rounded-2xl flex items-center justify-between mb-2 border border-transparent hover:border-emerald-100 transition-all">
                    <div class="flex-1">
                        <p class="font-extrabold text-sm text-slate-800">${item.name}</p>
                        <p class="text-[10px] text-slate-400 font-bold">₹${item.rate.toFixed(2)}/u</p>
                    </div>
                    <div class="flex-1 flex justify-center">
                        <div class="flex items-center bg-white rounded-xl p-1 gap-4 shadow-sm border border-slate-100">
                            <button onclick="updateCartQty(${idx}, -1)" class="w-6 h-6 flex items-center justify-center text-emerald-600 font-bold"><i class="fas fa-minus text-[10px]"></i></button>
                            <span class="text-xs font-black w-3 text-center">${item.qty}</span>
                            <button onclick="updateCartQty(${idx}, 1)" class="w-6 h-6 flex items-center justify-center text-emerald-600 font-bold"><i class="fas fa-plus text-[10px]"></i></button>
                        </div>
                    </div>
                    <div class="flex-1 text-right flex items-center justify-end gap-3">
                        <span class="font-black text-emerald-950 text-sm">₹${item.total.toFixed(2)}</span>
                        <button onclick="cart.splice(${idx},1); updateCartUI();" class="text-rose-300 hover:text-rose-500"><i class="fas fa-circle-xmark"></i></button>
                    </div>
                </div>
            `).join('')}
        `;

        const grandTotal = cart.reduce((a, b) => a + b.total, 0);
        totalLabel.innerText = `₹${grandTotal.toFixed(2)}`;
        countLabel.innerText = `${cart.reduce((a, b) => a + b.qty, 0)} UNITS`;
    }

    function updateCartQty(idx, delta) {
        const item = cart[idx];
        const med = inventory.find(m => m.id == item.id);
        const newQty = item.qty + delta;

        if(newQty <= 0) {
            cart.splice(idx, 1);
        } else {
            // STOCK CHECK DURING UPDATE
            if(delta > 0 && newQty > med.qty) {
                alert(`Cannot add more. Inventory only has ${med.qty} units of ${med.name}.`);
                return;
            }
            item.qty = newQty;
            item.total = item.qty * item.rate;
        }
        updateCartUI();
    }

    function confirmSale() {
        if(cart.length === 0) return alert("Add items to finalize the bill.");
        
        const customerName = document.getElementById('cName').value || "Walk-in Customer";
        const customerMob = document.getElementById('cMob').value || "9999999999";

        const newInvoice = {
            id: 'INV-' + Date.now(),
            date: document.getElementById('saleDate').value,
            customer: customerName,
            mobile: customerMob,
            items: [...cart],
            total: cart.reduce((a,b) => a + b.total, 0),
            payment: document.getElementById('payMode').value
        };

        // Update Permanent Inventory
        cart.forEach(cartItem => {
            let med = inventory.find(m => m.id == cartItem.id);
            if(med) med.qty -= cartItem.qty;
        });

        sales.push(newInvoice);
        cart = [];
        syncDB();
        alert("Invoice generated successfully!");
        renderDashboard();
    }

    /* -----------------------------------------------------------
       4. INVENTORY SYSTEM (FILTERS, SEARCH, CRUD)
    ----------------------------------------------------------- */
    let currentInvFilter = 'all';

    function renderInventory() {
        setTabActive('nav-inv');
        document.getElementById('main-content').innerHTML = `
            <div class="bg-white p-6 rounded-3xl card-shadow border border-slate-50 space-y-4">
                <div class="flex items-center gap-2">
                    <i class="fas fa-plus-circle text-emerald-800"></i>
                    <h3 class="font-black text-emerald-950 uppercase text-xs tracking-widest" id="invTitle">Add New Stock</h3>
                </div>
                <input id="invId" type="hidden">
                <input id="invName" placeholder="Medicine Brand Name" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm font-bold">
                <input id="invComp" placeholder="Composition (Salt Name)" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm font-medium">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-50 p-3 rounded-2xl">
                        <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Cost Price</p>
                        <input id="invCost" type="number" placeholder="0.00" class="bg-transparent font-bold text-sm w-full outline-none">
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl">
                        <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Selling Rate</p>
                        <input id="invRate" type="number" placeholder="0.00" class="bg-transparent font-bold text-sm w-full outline-none">
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl">
                        <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Initial Qty</p>
                        <input id="invQty" type="number" placeholder="0" class="bg-transparent font-bold text-sm w-full outline-none">
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl">
                        <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Expiry Date</p>
                        <input id="invExp" type="date" class="bg-transparent font-bold text-sm w-full outline-none">
                    </div>
                </div>
                <button id="saveInvBtn" onclick="saveMedicineAction()" class="w-full bg-emerald-800 text-white p-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-emerald-100 btn-animate">
                    Save to Inventory
                </button>
            </div>

            <div class="sticky top-[80px] z-30 bg-[#F3F8F5] pt-2 pb-4 space-y-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-5 top-5 text-slate-400"></i>
                    <input id="invSearch" oninput="applyInvFilters()" placeholder="Search by name or salt..." class="w-full pl-12 p-5 bg-white rounded-3xl card-shadow border border-slate-100 text-sm font-medium outline-none">
                </div>
                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                    <button onclick="changeInvFilter('all', this)" class="inv-filter-btn px-6 py-2.5 rounded-full text-[10px] font-black uppercase bg-emerald-800 text-white shadow-lg">All</button>
                    <button onclick="changeInvFilter('low', this)" class="inv-filter-btn px-6 py-2.5 rounded-full text-[10px] font-black uppercase bg-white text-slate-500 border border-slate-100">Low Stock</button>
                    <button onclick="changeInvFilter('expired', this)" class="inv-filter-btn px-6 py-2.5 rounded-full text-[10px] font-black uppercase bg-white text-slate-500 border border-slate-100">Expired</button>
                    <button onclick="changeInvFilter('safe', this)" class="inv-filter-btn px-6 py-2.5 rounded-full text-[10px] font-black uppercase bg-white text-slate-500 border border-slate-100">Safe Stock</button>
                </div>
            </div>

            <div id="invList" class="space-y-4"></div>
        `;
        applyInvFilters();
    }

    function changeInvFilter(type, btn) {
        currentInvFilter = type;
        document.querySelectorAll('.inv-filter-btn').forEach(b => {
            b.classList.replace('bg-emerald-800', 'bg-white');
            b.classList.replace('text-white', 'text-slate-500');
            b.classList.add('border-slate-100');
        });
        btn.classList.replace('bg-white', 'bg-emerald-800');
        btn.classList.replace('text-slate-500', 'text-white');
        btn.classList.remove('border-slate-100');
        applyInvFilters();
    }

    function applyInvFilters() {
        const query = document.getElementById('invSearch').value.toLowerCase();
        const listContainer = document.getElementById('invList');
        const today = new Date();

        let filtered = inventory.filter(m => {
            const matchesSearch = m.name.toLowerCase().includes(query) || (m.composition || "").toLowerCase().includes(query);
            const expDate = new Date(m.expiry);

            if(currentInvFilter === 'low') return matchesSearch && m.qty < 15;
            if(currentInvFilter === 'expired') return matchesSearch && expDate <= today;
            if(currentInvFilter === 'safe') return matchesSearch && m.qty >= 15 && expDate > today;
            return matchesSearch;
        });

        if(filtered.length === 0) {
            listContainer.innerHTML = `<div class="text-center py-20 text-slate-400 font-bold uppercase text-[10px] tracking-widest italic">No matching stock found</div>`;
            return;
        }

        listContainer.innerHTML = filtered.map(m => {
            const isLow = m.qty < 15;
            const isExpired = new Date(m.expiry) <= today;
            
            return `
                <div class="bg-white p-5 rounded-3xl card-shadow border ${isExpired ? 'border-rose-200 bg-rose-50/20' : (isLow ? 'border-amber-200 bg-amber-50/20' : 'border-slate-100')} space-y-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <p class="font-extrabold text-slate-800">${m.name}</p>
                                ${isExpired ? '<span class="bg-rose-600 text-white text-[8px] px-1.5 py-0.5 rounded font-black uppercase">Expired</span>' : ''}
                                ${isLow && !isExpired ? '<span class="bg-amber-500 text-white text-[8px] px-1.5 py-0.5 rounded font-black uppercase">Low</span>' : ''}
                            </div>
                            <p class="text-[10px] text-slate-400 font-bold italic leading-none">${m.composition || 'No Salt Info'}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-slate-400 line-through">₹${(m.cost || 0).toFixed(2)}</p>
                            <p class="text-base font-black text-emerald-800">₹${m.rate.toFixed(2)}</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between pt-3 border-t border-black/5">
                        <div class="flex gap-4">
                            <div><p class="text-[9px] font-bold text-slate-400 uppercase">Current Stock</p><p class="text-sm font-black ${isLow ? 'text-rose-600' : 'text-emerald-700'}">${m.qty} Units</p></div>
                            <div><p class="text-[9px] font-bold text-slate-400 uppercase">Expiry</p><p class="text-sm font-black text-slate-700">${m.expiry}</p></div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editMedicine(${m.id})" class="w-9 h-9 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fas fa-pencil text-xs"></i></button>
                            <button onclick="deleteMedicine(${m.id})" class="w-9 h-9 rounded-xl bg-rose-50 text-rose-600 flex items-center justify-center"><i class="fas fa-trash-can text-xs"></i></button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function saveMedicineAction() {
        const id = document.getElementById('invId').value;
        const name = document.getElementById('invName').value;
        const rate = parseFloat(document.getElementById('invRate').value);
        const qty = parseInt(document.getElementById('invQty').value);
        const exp = document.getElementById('invExp').value;

        if(!name || isNaN(rate) || isNaN(qty) || !exp) return alert("Mandatory fields missing!");

        const medData = {
            id: id ? parseInt(id) : Date.now(),
            name,
            composition: document.getElementById('invComp').value,
            cost: parseFloat(document.getElementById('invCost').value) || 0,
            rate,
            qty,
            expiry: exp
        };

        if(id) {
            const idx = inventory.findIndex(m => m.id == id);
            inventory[idx] = medData;
        } else {
            inventory.push(medData);
        }

        syncDB();
        renderInventory();
        alert("Stock updated successfully.");
    }

    function editMedicine(id) {
        const m = inventory.find(i => i.id == id);
        if(!m) return;
        
        document.getElementById('invId').value = m.id;
        document.getElementById('invName').value = m.name;
        document.getElementById('invComp').value = m.composition;
        document.getElementById('invCost').value = m.cost;
        document.getElementById('invRate').value = m.rate;
        document.getElementById('invQty').value = m.qty;
        document.getElementById('invExp').value = m.expiry;
        
        document.getElementById('invTitle').innerText = "Update Medicine";
        document.getElementById('saveInvBtn').innerText = "Confirm Update";
        document.getElementById('saveInvBtn').classList.replace('bg-emerald-800', 'bg-blue-600');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function deleteMedicine(id) {
        if(confirm("Confirm deletion? This cannot be undone.")) {
            inventory = inventory.filter(m => m.id != id);
            syncDB();
            renderInventory();
        }
    }

    /* -----------------------------------------------------------
       5. CUSTOMER DIRECTORY
    ----------------------------------------------------------- */
    function renderCustomers() {
        setTabActive('nav-cust');
        // Extract unique customers based on mobile
        const rawMap = new Map();
        sales.forEach(s => {
            if(!rawMap.has(s.mobile)) {
                rawMap.set(s.mobile, { name: s.customer, mobile: s.mobile, lastVisit: s.date, totalSpent: s.total });
            } else {
                let entry = rawMap.get(s.mobile);
                entry.totalSpent += s.total;
            }
        });
        const customers = Array.from(rawMap.values());

        document.getElementById('main-content').innerHTML = `
            <div class="flex items-center justify-between mb-2">
                <h3 class="font-extrabold text-slate-800">Customer Directory</h3>
                <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md uppercase tracking-widest">${customers.length} Contacts</span>
            </div>
            <div class="space-y-3">
                ${customers.length === 0 ? '<div class="bg-white p-10 rounded-3xl text-center text-slate-300 italic text-sm">No customer records yet</div>' : 
                  customers.map(c => `
                    <div class="bg-white p-5 rounded-3xl border border-slate-50 card-shadow flex items-center gap-4">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-emerald-50 to-blue-50 flex items-center justify-center font-black text-emerald-800 text-xl shadow-inner">
                            ${c.name[0].toUpperCase()}
                        </div>
                        <div class="flex-1">
                            <p class="font-black text-slate-800 leading-none">${c.name}</p>
                            <p class="text-xs text-slate-400 font-bold mt-1.5"><i class="fas fa-phone-flip text-[10px] mr-1"></i> +91 ${c.mobile}</p>
                            <div class="flex gap-4 mt-3 pt-3 border-t border-slate-50">
                                <div><p class="text-[8px] text-slate-400 font-black uppercase tracking-widest">Last Visit</p><p class="text-[10px] font-bold text-slate-700">${c.lastVisit}</p></div>
                                <div><p class="text-[8px] text-slate-400 font-black uppercase tracking-widest">Total Value</p><p class="text-[10px] font-bold text-emerald-700">₹${c.totalSpent.toFixed(0)}</p></div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    /* -----------------------------------------------------------
       6. REPORTS & ANALYTICS
    ----------------------------------------------------------- */
    function renderReports() {
        setTabActive('nav-rep');
        const totalSalesVal = sales.reduce((a, b) => a + b.total, 0);
        const totalExpVal = expenses.reduce((a, b) => a + b.amt, 0);
        const netProfit = totalSalesVal - totalExpVal;

        // Group sales by date
        const grouped = sales.reduce((acc, s) => {
            acc[s.date] = (acc[s.date] || 0) + s.total;
            return acc;
        }, {});

        document.getElementById('main-content').innerHTML = `
            <div class="bg-emerald-950 p-8 rounded-[40px] text-white card-shadow relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-black opacity-50 uppercase tracking-[4px] mb-2">Portfolio Net Balance</p>
                    <h2 class="text-5xl font-black">₹${netProfit.toFixed(0)}</h2>
                    <div class="flex gap-6 mt-8">
                        <div><p class="text-[9px] font-bold opacity-40 uppercase tracking-widest mb-1">Total Sales</p><p class="font-black text-emerald-400 text-lg">₹${totalSalesVal.toFixed(0)}</p></div>
                        <div class="w-[1px] h-10 bg-white/10"></div>
                        <div><p class="text-[9px] font-bold opacity-40 uppercase tracking-widest mb-1">Total Exp</p><p class="font-black text-rose-400 text-lg">₹${totalExpVal.toFixed(0)}</p></div>
                    </div>
                </div>
                <i class="fas fa-chart-line text-[150px] absolute -right-5 -bottom-10 opacity-5 rotate-12"></i>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-slate-50 card-shadow space-y-4">
                <h3 class="font-black text-xs uppercase tracking-widest text-slate-400">Add Operating Expense</h3>
                <div class="flex gap-2">
                    <input id="expName" placeholder="e.g., Staff Salary, Rent" class="flex-1 bg-slate-50 p-4 rounded-2xl text-sm font-bold border-none">
                    <input id="expAmt" type="number" placeholder="Amt" class="w-24 bg-slate-50 p-4 rounded-2xl text-sm font-bold border-none">
                    <button onclick="addExpAction()" class="bg-rose-600 text-white w-14 rounded-2xl btn-animate">
                        <i class="fas fa-minus"></i>
                    </button>
                </div>
            </div>

            <div class="space-y-3">
                <h3 class="font-extrabold text-slate-800 px-1">Daily Sales Log</h3>
                ${Object.keys(grouped).length === 0 ? '<p class="text-center py-10 text-slate-400 italic text-xs uppercase tracking-widest">No transaction history</p>' : 
                  Object.keys(grouped).sort().reverse().map(date => `
                    <div class="bg-white p-5 rounded-3xl border border-slate-50 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-600"><i class="fas fa-calendar-check text-xs"></i></div>
                            <div><p class="font-black text-sm text-slate-800">${date}</p><p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Completed Revenue</p></div>
                        </div>
                        <p class="font-black text-emerald-800">₹${grouped[date].toFixed(2)}</p>
                    </div>
                `).join('')}
            </div>

            <div class="bg-rose-50/50 p-6 rounded-3xl border border-rose-100">
                <h3 class="text-rose-900 font-black text-xs uppercase tracking-widest mb-4">Expense Breakdown</h3>
                <div class="space-y-3">
                    ${expenses.length === 0 ? '<p class="text-[10px] text-rose-400 italic">No expenses recorded yet.</p>' : 
                      expenses.map(e => `
                        <div class="flex justify-between items-center text-xs">
                            <span class="font-bold text-rose-800">${e.name}</span>
                            <span class="font-black text-rose-600">-₹${e.amt.toFixed(2)}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function addExpAction() {
        const name = document.getElementById('expName').value;
        const amt = parseFloat(document.getElementById('expAmt').value);
        if(!name || isNaN(amt)) return;
        
        expenses.push({ id: Date.now(), name, amt, date: new Date().toISOString().split('T')[0] });
        syncDB();
        renderReports();
    }

    /* INITIAL BOOT */
    window.onload = () => {
        renderDashboard();
    };
</script>
</body>
</html>
