<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pharmacy Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #F3F8F5; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .active-tab { color: #065F46 !important; font-weight: bold; }
        .active-tab i { color: #065F46; background: #D1FAE5; padding: 10px; border-radius: 12px; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative">
        <header class="p-4 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-800 p-2 rounded-lg text-white"><i class="fas fa-prescription"></i></div>
                <h1 class="font-bold text-lg">Pharmacy Manager Pro</h1>
            </div>
            <button onclick="location.reload()" class="text-slate-400"><i class="fas fa-sync-alt"></i></button>
        </header>

        <main id="main-content" class="p-4 space-y-4"></main>

        <nav class="fixed bottom-0 w-full max-w-md glass-nav border-t border-slate-100 flex justify-around py-3 z-50">
            <button onclick="renderDashboard()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-dash">
                <i class="fas fa-home"></i><span class="text-[10px]">Home</span>
            </button>
            <button onclick="renderInventory()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-inv">
                <i class="fas fa-pills"></i><span class="text-[10px]">Stock</span>
            </button>
            <button onclick="renderSales()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-sales">
                <i class="fas fa-shopping-cart"></i><span class="text-[10px]">Sales</span>
            </button>
            <button onclick="renderCustomers()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-cust">
                <i class="fas fa-user-friends"></i><span class="text-[10px]">Users</span>
            </button>
            <button onclick="renderReports()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-rep">
                <i class="fas fa-file-invoice-dollar"></i><span class="text-[10px]">Report</span>
            </button>
        </nav>
    </div>

    <script>
        // Data Storage
        let inventory = JSON.parse(localStorage.getItem('ph_stock')) || [];
        let sales = JSON.parse(localStorage.getItem('ph_sales')) || [];
        let expenses = JSON.parse(localStorage.getItem('ph_exp')) || [];
        let cart = [];
        let currentSaleTab = 'new';

        const save = () => {
            localStorage.setItem('ph_stock', JSON.stringify(inventory));
            localStorage.setItem('ph_sales', JSON.stringify(sales));
            localStorage.setItem('ph_exp', JSON.stringify(expenses));
        };

        const setNav = (id) => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            const activeBtn = document.getElementById(id);
            if(activeBtn) activeBtn.classList.add('active-tab');
            window.scrollTo(0,0);
        };

        // --- DASHBOARD ---
        function renderDashboard() {
            setNav('nav-dash');
            const today = new Date().toISOString().split('T')[0];
            const tSales = sales.filter(s => s.date === today).reduce((a, b) => a + b.total, 0);
            
            document.getElementById('main-content').innerHTML = `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-50 text-center">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-1">Today's Revenue</p>
                    <h2 class="text-4xl font-black text-emerald-800">₹${tSales}</h2>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-2xl shadow-sm">
                        <p class="text-2xl font-bold">${inventory.length}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Items</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm">
                        <p class="text-2xl font-bold text-rose-500">${inventory.filter(i=>i.qty < 10).length}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Low Stock</p>
                    </div>
                </div>
            `;
        }

        // --- INVENTORY ---
        function renderInventory() {
            setNav('nav-inv');
            document.getElementById('main-content').innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-xl">Stock</h2>
                    <button onclick="addMedicine()" class="bg-emerald-800 text-white px-4 py-2 rounded-xl text-xs font-bold">+ Add</button>
                </div>
                <div class="space-y-3">
                    ${inventory.map(m => `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 flex justify-between">
                            <div>
                                <h4 class="font-bold">${m.name}</h4>
                                <p class="text-[10px] text-slate-400">Qty: ${m.qty} | Rate: ₹${m.rate}</p>
                            </div>
                            <button onclick="deleteMed(${m.id})" class="text-rose-400"><i class="fas fa-trash"></i></button>
                        </div>
                    `).join('') || '<p class="text-center py-10 text-slate-400">Inventory is empty</p>'}
                </div>
            `;
        }

        function addMedicine() {
            const name = prompt("Medicine Name:");
            const qty = parseInt(prompt("Quantity:"));
            const rate = parseFloat(prompt("Rate:"));
            if(name && qty) {
                inventory.push({ id: Date.now(), name, qty, rate });
                save(); renderInventory();
            }
        }

        function deleteMed(id) {
            inventory = inventory.filter(i=>i.id !== id);
            save(); renderInventory();
        }

        // --- SALES ---
        function renderSales() {
            setNav('nav-sales');
            const activeStyle = "border-b-2 border-emerald-800 text-emerald-800";
            document.getElementById('main-content').innerHTML = `
                <div class="flex gap-6 border-b border-slate-100 font-bold text-sm mb-4">
                    <button onclick="currentSaleTab='new';renderSales()" class="pb-2 ${currentSaleTab==='new'?activeStyle:'text-slate-400'}">New Bill</button>
                    <button onclick="currentSaleTab='history';renderSales()" class="pb-2 ${currentSaleTab==='history'?activeStyle:'text-slate-400'}">History</button>
                </div>
                <div id="sales-body"></div>
            `;
            if(currentSaleTab === 'new') renderNewSale(); else renderSalesHistory();
        }

        function renderNewSale() {
            document.getElementById('sales-body').innerHTML = `
                <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4 mb-4">
                    <input id="cN" placeholder="Customer Name" class="w-full bg-slate-50 p-3 rounded-xl border-none outline-none">
                    <input id="cM" placeholder="Mobile Number" class="w-full bg-slate-50 p-3 rounded-xl border-none outline-none">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="date" id="sD" value="${new Date().toISOString().split('T')[0]}" class="bg-slate-50 p-3 rounded-xl text-xs">
                        <select id="sP" class="bg-slate-50 p-3 rounded-xl text-xs"><option>Cash</option><option>Online</option></select>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4">
                    <div class="flex gap-2">
                        <select id="mS" class="flex-1 bg-slate-50 p-3 rounded-xl text-xs">
                            <option value="">Select Medicine</option>
                            ${inventory.map(i=>`<option value="${i.id}">${i.name} (${i.qty})</option>`).join('')}
                        </select>
                        <input id="mQ" type="number" placeholder="Qty" class="w-16 bg-slate-50 p-3 rounded-xl">
                        <button onclick="addToCart()" class="bg-emerald-800 text-white px-4 rounded-xl"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="cart-list" class="divide-y divide-slate-50"></div>
                    <div class="flex justify-between font-black text-lg pt-4"><span>Total</span><span id="total-val">₹0.00</span></div>
                    <button onclick="confirmSale()" class="w-full bg-emerald-800 text-white p-4 rounded-2xl font-bold">Confirm Sale</button>
                </div>
            `;
            updateCartUI();
        }

        function addToCart() {
            const id = document.getElementById('mS').value;
            const qty = parseInt(document.getElementById('mQ').value);
            const med = inventory.find(i=>i.id == id);
            if(med && qty > 0 && qty <= med.qty) {
                cart.push({ id: med.id, name: med.name, qty, rate: med.rate, total: med.rate * qty });
                updateCartUI();
            } else { alert("Check stock/qty"); }
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            if(!list) return;
            list.innerHTML = cart.map((c,i)=>`
                <div class="flex justify-between py-2 text-sm">
                    <span>${c.name} x ${c.qty}</span>
                    <div class="flex gap-3"><b>₹${c.total}</b><button onclick="cart.splice(${i},1);updateCartUI()" class="text-rose-500">×</button></div>
                </div>
            `).join('');
            document.getElementById('total-val').innerText = `₹${cart.reduce((a,b)=>a+b.total,0)}`;
        }

        function confirmSale() {
            if(!cart.length) return;
            const bill = {
                id: Date.now(),
                name: document.getElementById('cN').value || "Guest",
                mobile: document.getElementById('cM').value || "N/A",
                date: document.getElementById('sD').value,
                payment: document.getElementById('sP').value,
                total: cart.reduce((a,b)=>a+b.total,0),
                items: [...cart]
            };
            sales.push(bill);
            cart.forEach(c => { let m = inventory.find(i=>i.id==c.id); if(m) m.qty -= c.qty; });
            cart = []; save(); renderSales();
        }

        function renderSalesHistory() {
            document.getElementById('sales-body').innerHTML = `
                <input oninput="searchS(this.value)" placeholder="Search by name..." class="w-full bg-white p-3 rounded-xl mb-4 shadow-sm border-none outline-none">
                <div id="h-list" class="space-y-3"></div>
            `;
            searchS('');
        }

        function searchS(query) {
            const filtered = sales.filter(s => s.name.toLowerCase().includes(query.toLowerCase()));
            document.getElementById('h-list').innerHTML = filtered.slice().reverse().map(s => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">
                    <div class="flex justify-between text-[10px] text-slate-400 font-bold mb-1"><span>${s.date}</span><span>${s.payment}</span></div>
                    <h4 class="font-bold text-sm">${s.name}</h4>
                    <div class="flex justify-between items-center mt-3 pt-2 border-t">
                        <span class="font-black text-emerald-800">₹${s.total}</span>
                        <div class="flex gap-4">
                            <button onclick="editSale(${s.id})" class="text-blue-500"><i class="fas fa-edit"></i></button>
                            <button onclick="delSale(${s.id})" class="text-rose-400"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function editSale(id) {
            const s = sales.find(i=>i.id === id);
            const nName = prompt("Edit Name:", s.name);
            const nTotal = prompt("Edit Total Amount:", s.total);
            if(nName !== null) { s.name = nName; s.total = parseFloat(nTotal); save(); renderSales(); }
        }

        function delSale(id) { if(confirm("Delete?")) { sales = sales.filter(i=>i.id!==id); save(); renderSales(); } }

        // --- CUSTOMERS ---
        function renderCustomers() {
            setNav('nav-cust');
            const unique = [];
            sales.forEach(s => { if(!unique.find(u=>u.mobile === s.mobile)) unique.push(s); });
            document.getElementById('main-content').innerHTML = `
                <h2 class="font-bold text-xl mb-4">Users</h2>
                <div class="space-y-3">
                    ${unique.map(c => `
                        <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                            <div><p class="font-bold">${c.name}</p><p class="text-[10px] text-slate-400">${c.mobile}</p></div>
                            <div class="bg-emerald-50 text-emerald-700 font-bold p-2 rounded-lg text-xs">Verified</div>
                        </div>
                    `).join('') || '<p class="text-center py-10 text-slate-400">No customers yet</p>'}
                </div>
            `;
        }

        // --- REPORTS ---
        function renderReports() {
            setNav('nav-rep');
            const totalS = sales.reduce((a,b)=>a+b.total,0);
            const totalE = expenses.reduce((a,b)=>a+b.amt,0);
            document.getElementById('main-content').innerHTML = `
                <div class="bg-white p-6 rounded-3xl shadow-sm mb-4">
                    <p class="text-xs font-bold text-slate-400 mb-1">Net Profit</p>
                    <h2 class="text-3xl font-black text-emerald-800">₹${totalS - totalE}</h2>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm mb-4">
                    <h4 class="text-xs font-bold mb-3 uppercase text-slate-400">Add Expense</h4>
                    <div class="flex gap-2">
                        <input id="eN" placeholder="Reason" class="flex-1 bg-slate-50 p-3 rounded-xl text-sm">
                        <input id="eA" type="number" placeholder="Amt" class="w-20 bg-slate-50 p-3 rounded-xl text-sm">
                        <button onclick="addExp()" class="bg-rose-500 text-white px-4 rounded-xl">-</button>
                    </div>
                </div>
                <div class="space-y-2">
                    ${expenses.map(e => `<div class="bg-white p-3 rounded-xl flex justify-between text-sm"><span>${e.name}</span><b class="text-rose-500">-₹${e.amt}</b></div>`).join('')}
                </div>
            `;
        }

        function addExp() {
            const n = document.getElementById('eN').value;
            const a = parseFloat(document.getElementById('eA').value);
            if(n && a) { expenses.push({ name: n, amt: a }); save(); renderReports(); }
        }

        // --- BOOTSTRAP APP ---
        window.onload = () => {
            renderDashboard(); // This ensures something is drawn immediately
        };
    </script>
</body>
</html>
