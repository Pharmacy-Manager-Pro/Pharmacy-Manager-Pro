<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Pharmacy Manager Pro</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">  
    <style>  
        body { background-color: #F3F8F5; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }  
        .hide-scroll::-webkit-scrollbar { display: none; }  
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }  
        .active-tab { color: #065F46; }  
        .active-tab i { color: #065F46; background: #D1FAE5; padding: 8px; border-radius: 12px; }  
    </style>  
</head>  
<body class="text-slate-800">  <div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative overflow-x-hidden">  
    <header class="p-4 flex justify-between items-center bg-white shadow-sm">  
        <div class="flex items-center gap-2">  
            <div class="bg-emerald-800 p-2 rounded-lg text-white">  
                <i class="fas fa-prescription-bottle-medical"></i>  
            </div>  
            <h1 class="font-bold text-lg">Pharmacy Manager Pro</h1>  
        </div>  
        <button onclick="location.reload()" class="text-slate-400"><i class="fas fa-rotate"></i></button>  
    </header>  

    <main id="main-content" class="p-4 space-y-4 hide-scroll"></main>  

    <nav class="fixed bottom-0 w-full max-w-md glass-nav border-t border-slate-100 flex justify-around py-3 px-2 z-50">  
        <button onclick="renderDashboard()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-dash">  
            <i class="fas fa-th-large"></i><span class="text-[10px] font-medium">Dashboard</span>  
        </button>  
        <button onclick="renderInventory()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-inv">  
            <i class="fas fa-box-archive"></i><span class="text-[10px] font-medium">Inventory</span>  
        </button> 
        <button onclick="renderSalesMain()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-sales">  
           <i class="fas fa-cash-register"></i><span class="text-[10px] font-medium">Sales</span>  
        </button>   
        <button onclick="renderCustomers()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-cust">  
            <i class="fas fa-users"></i><span class="text-[10px] font-medium">Customers</span>  
        </button>  
        <button onclick="renderReports()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-rep">  
            <i class="fas fa-chart-pie"></i><span class="text-[10px] font-medium">Reports</span>  
        </button>  
    </nav>  
</div>  

<script>  
    // Data Initialization  
    let inventory = JSON.parse(localStorage.getItem('pharma_v3_inv')) || [];  
    let sales = JSON.parse(localStorage.getItem('pharma_v3_sales')) || [];  
    let expenses = JSON.parse(localStorage.getItem('pharma_v3_exp')) || [];  
    const save = () => {  
        localStorage.setItem('pharma_v3_inv', JSON.stringify(inventory));  
        localStorage.setItem('pharma_v3_sales', JSON.stringify(sales));  
        localStorage.setItem('pharma_v3_exp', JSON.stringify(expenses));  
    };  

    const setNav = (id) => {  
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));  
        document.getElementById(id).classList.add('active-tab');  
    };  

    // --- DASHBOARD ---  
    function renderDashboard() {  
        setNav('nav-dash');  
        const today = new Date().toISOString().split('T')[0];  
        const tSales = sales.filter(s => s.date === today).reduce((a, b) => a + b.total, 0);  
        const lowStockCount = inventory.filter(m => m.qty < 10).length;  

        document.getElementById('main-content').innerHTML = `  
            <div class="bg-orange-50 border border-orange-100 p-4 rounded-2xl flex gap-3">  
                <div class="bg-orange-100 text-orange-600 w-10 h-10 rounded-full flex items-center justify-center">  
                    <i class="fas fa-bell"></i>  
                </div>  
                <div>  
                    <h4 class="font-bold text-orange-800 text-sm">Stock khatam hone wala hai!</h4>  
                    <p class="text-xs text-orange-700">${lowStockCount} medicines low stock. Check inventory.</p>  
                </div>  
            </div>  

            <div class="grid grid-cols-2 gap-3">  
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">  
                    <div class="bg-emerald-50 text-emerald-600 w-8 h-8 rounded-lg flex items-center justify-center mb-2"><i class="fas fa-pills"></i></div>  
                    <p class="text-3xl font-bold">${inventory.length}</p>  
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-tight">Total Medicines</p>  
                </div>  
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">  
                    <div class="bg-orange-50 text-orange-600 w-8 h-8 rounded-lg flex items-center justify-center mb-2"><i class="fas fa-triangle-exclamation"></i></div>  
                    <p class="text-3xl font-bold text-orange-600">${lowStockCount}</p>  
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-tight">Low Stock</p>  
                </div>  
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">  
                    <div class="bg-rose-50 text-rose-600 w-8 h-8 rounded-lg flex items-center justify-center mb-2"><i class="fas fa-calendar-xmark"></i></div>  
                    <p class="text-3xl font-bold">0</p>  
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-tight">Short Expiry</p>  
                </div>  
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">  
                    <div class="bg-blue-50 text-blue-600 w-8 h-8 rounded-lg flex items-center justify-center mb-2"><i class="fas fa-indian-rupee-sign"></i></div>  
                    <p class="text-3xl font-bold">₹${tSales}</p>  
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-tight">Today's Sales</p>  
                </div>  
            </div>  
              
            <h3 class="font-bold text-slate-600 mt-4">Low Stock Medicines</h3>  
            <div class="space-y-2">  
                ${inventory.filter(m => m.qty < 10).slice(0, 5).map(m => `  
                    <div class="bg-white p-3 rounded-xl flex items-center justify-between border border-slate-50">  
                        <div class="flex items-center gap-3">  
                            <div class="bg-orange-50 text-orange-500 p-2 rounded-lg text-xs"><i class="fas fa-capsules"></i></div>  
                            <div><p class="font-bold text-sm">${m.name}</p><p class="text-[10px] text-slate-400">₹${m.rate} per unit</p></div>  
                        </div>  
                        <div class="text-right">  
                            <span class="bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full text-[10px] font-bold">Low Stock</span>  
                            <p class="text-xs font-bold text-orange-600 mt-1">Qty: ${m.qty}</p>  
                        </div>  
                    </div>  
                `).join('')}  
            </div>  
        `;  
    }  

     function updateDashboard() {
    const today = new Date().toISOString().split('T')[0];
    const todaySales = sales.filter(s => s.date === today).reduce((a, b) => a + b.total, 0);
    const lowStockCount = inventory.filter(m => m.qty < 10).length;

    // Is block ko search karein aur replace karein:
    // Today's Sales Card update
    document.getElementById('dash-today-sales').innerText = `₹${todaySales}`; 
    // Low Stock count card
    document.getElementById('dash-low-stock').innerText = lowStockCount;
    // Total Medicines count
    document.getElementById('dash-total-pills').innerText = inventory.length;

    // Low Stock List (top 5) refresh karein
    const listCont = document.getElementById('dash-low-stock-list');
    listCont.innerHTML = inventory.filter(m => m.qty < 10).slice(0, 5).map(m => `
        <div class="bg-white p-3 rounded-xl flex items-center justify-between border border-slate-50">  
            <div class="flex items-center gap-3">  
                <div class="bg-orange-50 text-orange-500 p-2 rounded-lg text-xs"><i class="fas fa-capsules"></i></div>  
                <div><p class="font-bold text-sm">${m.name}</p><p class="text-[10px] text-slate-400">₹${m.rate} per unit</p></div>  
            </div>  
            <div class="text-right">  
                <span class="bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full text-[10px] font-bold">Low Stock</span>  
                <p class="text-xs font-bold text-orange-600 mt-1">Qty: ${m.qty}</p>  
            </div>  
        </div>  
    `).join('');
}

    // --- SALES ENTRY (AS PER IMAGE) ---  
    let cart = [];  
    function renderNewSale() {
    setNav('nav-sales');
    // Important: Cart initial clean-up jab page load ho
    cart = []; 

    document.getElementById('main-content').innerHTML = `
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-50 space-y-4 mb-4">
            <h3 class="font-bold flex items-center gap-2"><i class="fas fa-user-circle text-emerald-800"></i> Customer Information</h3>
            <input id="cName" placeholder="Customer Name (Optional)" class="w-full bg-slate-50 border-none p-4 rounded-xl text-sm outline-none">
            <input id="cMob" placeholder="Mobile Number (Optional)" class="w-full bg-slate-50 border-none p-4 rounded-xl text-sm outline-none">
            <input id="cAddr" placeholder="Address (Optional)" class="w-full bg-slate-50 border-none p-4 rounded-xl text-sm outline-none">
            <div class="grid grid-cols-2 gap-3">
                 <div class="bg-slate-50 p-3 rounded-xl">
                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Sale Date</p>
                    <input id="saleDate" type="date" value="${new Date().toISOString().split('T')[0]}" class="bg-transparent font-bold text-sm outline-none border-b border-slate-200 w-full">
                 </div>
                 <div class="bg-slate-50 p-3 rounded-xl flex flex-col justify-center">
                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Pay Mode</p>
                    <select id="payMode" class="bg-transparent font-bold text-sm outline-none">
                        <option value="Cash">Cash</option>
                        <option value="Online">Online</option>
                    </select>
                 </div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-50">
            <h3 class="font-bold flex items-center gap-2 mb-4" id="cartHeaderLabel">
                <i class="fas fa-cart-shopping text-emerald-800"></i> Medicine Cart
            </h3>
              
            <div class="flex gap-2 mb-4">
                <select id="medSelect" class="flex-1 bg-slate-50 p-4 rounded-xl text-sm border-none outline-none ring-1 ring-slate-100">
                    <option value="">Select medicine</option>
                    ${inventory.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}
                </select>
                <input id="medQty" type="number" placeholder="Qty" class="w-20 bg-slate-50 p-4 rounded-xl text-sm border-none outline-none ring-1 ring-slate-100 text-center">
                <button onclick="addToCart()" class="bg-[#1E6B4B] text-white w-14 h-14 rounded-xl flex items-center justify-center text-2xl active:scale-95 transition-transform">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <div id="cartItems" class="space-y-3 py-4 border-t border-slate-100 min-h-[50px]"></div>

            <div class="bg-emerald-50 p-4 rounded-xl flex justify-between items-center mt-6 border border-emerald-100">
                <span class="font-bold text-emerald-900">Total Bill Amount</span>
                <span class="text-xl font-black text-emerald-800" id="totalAmt">₹0.00</span>
            </div>

            <button onclick="confirmSale()" class="w-full bg-emerald-800 text-white p-4 rounded-2xl mt-4 font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform">
                <i class="fas fa-check-circle"></i> Confirm Sale
            </button>
        </div>
    `;
    updateCartUI();
}

    function renderSalesMain() {
    setNav('nav-sales');
    document.getElementById('main-content').innerHTML = `
        <h2 class="font-bold text-lg mb-1">Sales</h2>
        <p class="text-xs text-slate-400 mb-6">Sales History & New Sale</p>

        <div class="flex gap-1 border-b border-slate-100 mb-6 pb-2">
            <button id="tab-history" onclick="showSalesSubTab('history')" class="flex-1 text-center py-2 px-1 text-emerald-800 font-bold border-b-2 border-emerald-800 text-xs">Sales History</button>
            <button id="tab-new" onclick="showSalesSubTab('new')" class="flex-1 text-center py-2 px-1 text-slate-400 font-medium border-b-2 border-transparent text-xs hover:text-emerald-700">New Sale</button>
        </div>

        <div id="sales-history-container" class="space-y-4"></div>
        <div id="new-sale-container" class="space-y-4" style="display: none;"></div>
    `;
    renderSalesHistory(); // Default history load karein
}

function showSalesSubTab(tabName) {
    const historyCont = document.getElementById('sales-history-container');
    const newCont = document.getElementById('new-sale-container');
    const tabHistory = document.getElementById('tab-history');
    const tabNew = document.getElementById('tab-new');

    // UI Tab State Management
    tabHistory.className = "flex-1 text-center py-2 px-1 text-slate-400 font-medium border-b-2 border-transparent text-xs hover:text-emerald-700";
    tabNew.className = "flex-1 text-center py-2 px-1 text-slate-400 font-medium border-b-2 border-transparent text-xs hover:text-emerald-700";

    if (tabName === 'history') {
        historyCont.style.display = 'block';
        newCont.style.display = 'none';
        tabHistory.className = "flex-1 text-center py-2 px-1 text-emerald-800 font-bold border-b-2 border-emerald-800 text-xs";
        renderSalesHistory();
    } else {
        historyCont.style.display = 'none';
        newCont.style.display = 'block';
        tabNew.className = "flex-1 text-center py-2 px-1 text-emerald-800 font-bold border-b-2 border-emerald-800 text-xs";
        renderNewSale(); 
    }
}
 
 // New functions for history & filters

let currentSalesFilter = 'all'; // Default filter state

function renderSalesHistory() {
    const container = document.getElementById('sales-history-container');
    if (!container) return;

    container.innerHTML = `
        <div class="space-y-6">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-4 text-slate-400"></i>
                <input id="salesSearch" oninput="runSalesFilter()" placeholder="Search by customer name or mobile..." class="w-full pl-11 p-4 bg-white rounded-2xl shadow-sm text-sm outline-none border border-slate-100">
            </div>

            <div class="space-y-3">
                <p class="text-[11px] uppercase font-bold text-slate-400"><i class="fas fa-filter mr-1"></i> Filter by Period</p>
                <div class="flex gap-2 overflow-x-auto pb-2 hide-scroll">
                   <button onclick="runSalesFilter('all', this)" class="sale-filter-btn whitespace-nowrap px-4 py-2 rounded-full text-[11px] font-bold bg-emerald-800 text-white">All Time</button>
                   <button onclick="runSalesFilter('7d', this)" class="sale-filter-btn whitespace-nowrap px-4 py-2 rounded-full text-[11px] font-bold bg-white text-slate-600 border border-slate-200">Last 7 Days</button>
                   <button onclick="runSalesFilter('30d', this)" class="sale-filter-btn whitespace-nowrap px-4 py-2 rounded-full text-[11px] font-bold bg-white text-slate-600 border border-slate-200">Last 30 Days</button>
                   <button onclick="runSalesFilter('thisMonth', this)" class="sale-filter-btn whitespace-nowrap px-4 py-2 rounded-full text-[11px] font-bold bg-white text-slate-600 border border-slate-200">This Month</button>
                   <button onclick="runSalesFilter('3m', this)" class="sale-filter-btn whitespace-nowrap px-4 py-2 rounded-full text-[11px] font-bold bg-white text-slate-600 border border-slate-200">Last 3 Months</button>
                   <button onclick="runSalesFilter('custom', this)" class="sale-filter-btn whitespace-nowrap px-4 py-2 rounded-full text-[11px] font-bold bg-white text-slate-600 border border-slate-200">Custom Range</button>

                </div>
                <div id="custom-range-inputs" class="flex gap-2 p-3 bg-white rounded-xl shadow-sm border border-slate-50" style="display: none;">
                    <input id="custom-start" type="date" class="bg-slate-50 p-3 rounded-lg text-xs flex-1 text-slate-400">
                    <input id="custom-end" type="date" class="bg-slate-50 p-3 rounded-lg text-xs flex-1 text-slate-400">
                    <button onclick="runSalesFilter('customRange')" class="bg-emerald-800 text-white p-3 rounded-lg text-xs font-bold"><i class="fas fa-check"></i></button>
                </div>
            </div>

            <div id="sales-list" class="space-y-4 pt-4 border-t border-slate-100"></div>
        </div>
    `;
    runSalesFilter('all');
}

window.runSalesFilter = (period, element) => {
    // Sabhi buttons ko default (white background + gray border) par lana
    document.querySelectorAll('.sale-filter-btn').forEach(b => {
        b.classList.remove('bg-emerald-800', 'text-white', 'border-emerald-800');
        b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
    });

    // Select kiye gaye button ko active look dena
    if (element) {
        element.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
        element.classList.add('bg-emerald-800', 'text-white', 'border-emerald-800');
    }

    // Baaki logic same...
    const customCont = document.getElementById('custom-range-inputs');
    if (period === 'all' || !period) {
        currentSalesFilter = 'all';
        if(customCont) customCont.style.display = 'none';
    } else if (period === 'custom') {
        if(customCont) customCont.style.display = 'flex';
        return;
    } else {
        currentSalesFilter = period;
        if(customCont) customCont.style.display = 'none';
    }

    const searchVal = document.getElementById('salesSearch') ? document.getElementById('salesSearch').value : "";
    filterAndDrawSales(currentSalesFilter, searchVal);
};



   function filterAndDrawSales(filter, search) {
    const listCont = document.getElementById('sales-list');
    if(!listCont) return; // Guard clause

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    let filtered = sales.filter(s => {
        const matchesSearch = (s.name || "").toLowerCase().includes(search.toLowerCase()) ||
                             (s.mobile || "").toLowerCase().includes(search.toLowerCase());
        
        if (!matchesSearch) return false; // Pehle search check karein
        if (filter === 'all' || !filter) return true; // Sab dikhao

        const sDate = new Date(s.date);
        sDate.setHours(0, 0, 0, 0);
        const daysDiff = (today - sDate) / (1000 * 60 * 60 * 24);

        if(filter === '7d') return daysDiff <= 7;
        if(filter === '30d') return daysDiff <= 30;
        if(filter === 'thisMonth') return sDate.getMonth() === today.getMonth() && sDate.getFullYear() === today.getFullYear();
        if(filter === '3m') return daysDiff <= 90;
        if(filter === 'custom') {
            const startStr = document.getElementById('custom-start').value;
            const endStr = document.getElementById('custom-end').value;
            if(!startStr || !endStr) return true;
            const start = new Date(startStr);
            const end = new Date(endStr);
            start.setHours(0,0,0,0);
            end.setHours(23,59,59,999);
            return sDate >= start && sDate <= end;
        }
        return true;
    });

    // Draw filtered cards
    if (filtered.length === 0) {
        listCont.innerHTML = `<p class="text-center text-slate-400 py-10 text-sm">No sales found in this period.</p>`;
        return;
    }

    // Sort by date (descending)
    filtered.sort((a,b) => new Date(b.date) - new Date(a.date));

    let html = "";
    let lastDate = "";

    filtered.forEach(s => {
        // Handle Date Header
        const sDateStr = new Date(s.date).toISOString().split('T')[0];
        let dateHeader = "";
        
        if(sDateStr !== lastDate) {
            let label = "";
            const daysDiff = (today - new Date(s.date)) / (1000 * 60 * 60 * 24);
            if(daysDiff === 0) label = '<span class="px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-800 font-bold">Today</span>';
            else if(daysDiff === 1) label = '<span class="px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 font-bold">Yesterday</span>';
            else {
                const options = { day: 'numeric', month: 'short', year: 'numeric' };
                label = `<span class="px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 font-bold">${new Date(s.date).toLocaleDateString('en-GB', options)}</span>`;
            }
            dateHeader = `<div class="flex items-center gap-2 text-[10px] mt-8 mb-4">${label}<span class="text-slate-300 font-bold">₹${filtered.filter(sale => sale.date === s.date).reduce((a, b) => a + b.total, 0).toFixed(2)}</span></div>`;
            lastDate = sDateStr;
        }

        // Draw Card
        const itemCount = s.items.length;
        html += `
            ${dateHeader}
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-50 space-y-4 transition-all active:scale-95">
                <div class="flex justify-between items-start">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-50 text-blue-600 w-11 h-11 rounded-full flex items-center justify-center font-bold text-xl">${s.name[0].toUpperCase()}</div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${s.name}</p>
                            <p class="text-xs text-slate-400 flex items-center gap-1"><i class="fas fa-phone text-blue-400"></i> ${s.mobile || 'Walk-in'}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="flex items-center gap-1.5 justify-end">
                            <span class="font-black text-xl text-emerald-800">₹${s.total.toFixed(2)}</span>
                            ${s.payment === 'Online' ? '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">Online</span>' : '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">Cash</span>'}
                        </div>
                        <p class="text-xs text-slate-400">${itemCount} ${itemCount === 1 ? 'item' : 'items'}</p>
                    </div>
                </div>

                <div id="med-list-${s.id}" class="space-y-2.5 pt-4 border-t border-slate-100 style="display: none;">
                    ${s.items.map(i => `
                        <div class="flex justify-between text-xs items-center">
                            <span class="text-slate-700 font-medium">${i.name}</span>
                            <span class="text-slate-400 text-[11px]"><b>${i.qty}</b> × ₹${i.rate.toFixed(2)}</span>
                            <span class="font-black text-emerald-800">₹${i.total.toFixed(2)}</span>
                        </div>
                    `).join('')}
                    <div class="pt-2 text-xs text-slate-500 italic flex items-center gap-1.5"><i class="fas fa-map-marker-alt text-rose-400"></i> ${s.address || 'Address N/A'}</div>
                </div>

                <div class="flex justify-end gap-2 pt-2 border-t border-slate-100/50">
                    <button onclick="editSale(${s.id})" class="text-[11px] px-4 py-2 rounded-lg bg-white border border-slate-100 text-slate-500 font-bold flex items-center gap-1.5 hover:bg-slate-50 hover:border-blue-200 hover:text-blue-600"><i class="fas fa-edit text-blue-500"></i> Edit</button>

    function editSale(id) {
    const saleToEdit = sales.find(s => s.id === id);
    if(!saleToEdit) return;

    if(confirm("Dhyan dein: Edit karne par purana record delete ho jayega aur cart mein load ho jayega. Continue?")) {
        // 1. Pehle purani items ka stock wapas inventory mein add karein (Inventory recover)
        saleToEdit.items.forEach(item => {
            let med = inventory.find(m => m.id == item.id);
            if(med) med.qty += item.qty;
        });

        // 2. Data ko cart aur inputs mein bharein
        cart = [...saleToEdit.items];
        
        // 3. New Sale tab open karein
        showSalesSubTab('new');

        // 4. Form fill karein (Wait for DOM render)
        setTimeout(() => {
            document.getElementById('cName').value = saleToEdit.name;
            document.getElementById('cMob').value = saleToEdit.mobile;
            document.getElementById('cAddr').value = saleToEdit.address;
            document.getElementById('saleDate').value = saleToEdit.date;
            document.getElementById('payMode').value = saleToEdit.payment;
            updateCartUI();
        }, 100);

        // 5. Purana record delete kar dein taaki duplicate na ho
        sales = sales.filter(s => s.id !== id);
        save();
    }
}
    
    function addToCart() {
    const mid = document.getElementById('medSelect').value;
    const qty = parseInt(document.getElementById('medQty').value);

    const med = inventory.find(m => m.id == mid);

    if(!med || qty <= 0 || isNaN(qty)) {
        alert("Please select medicine and enter valid quantity");
        return;
    }

    // Check ki kitna stock available hai
    let existing = cart.find(item => item.id == mid);
    let currentInCart = existing ? existing.qty : 0;
    let totalRequested = currentInCart + qty;

    if(totalRequested > med.qty) {
        alert(`Oops! Stock kam hai. Available: ${med.qty}`);
        return;
    }

    if(existing) {
        existing.qty = totalRequested;
        existing.total = existing.qty * existing.rate;
    } else {
        cart.push({
            id: med.id,
            name: med.name,
            qty: qty,
            rate: med.rate,
            total: med.rate * qty
        });
    }

    document.getElementById('medQty').value = "";
    updateCartUI();
}

      function updateCartQty(index, change) {
    const item = cart[index];
    const med = inventory.find(m => m.id == item.id);

    if (change > 0) { // Agar plus button dabaya hai
        if (item.qty + 1 > med.qty) {
            alert("Isse zyada stock nahi hai!");
            return;
        }
        item.qty += 1;
    } else { // Agar minus button dabaya hai
        item.qty -= 1;
    }

    if (item.qty <= 0) {
        cart.splice(index, 1);
    } else {
        item.total = item.qty * item.rate;
    }
    
    updateCartUI();
}

     function renderInventory() {  
setNav('nav-inv');  
let currentFilter = 'all';   

const drawList = (f = 'all', s = "") => {  
    const listContainer = document.getElementById('inv-list');  
    const today = new Date();  

    let filtered = inventory.filter(m => {  
        const matchesSearch = (m.name || "").toLowerCase().includes(s.toLowerCase()) ||   
                             (m.composition || "").toLowerCase().includes(s.toLowerCase());  
          
        const expDate = new Date(m.expiry);  
        const monthsToExp = (expDate - today) / (1000 * 60 * 60 * 24 * 30);  

        if(f === 'low') return matchesSearch && m.qty < 10 && expDate > today;  
        if(f === 'short') return matchesSearch && monthsToExp <= 6 && monthsToExp > 0;  
        if(f === 'expired') return matchesSearch && expDate <= today;  
        if(f === 'instock') return matchesSearch && m.qty >= 10 && monthsToExp > 6;  
        return matchesSearch;  
    });  

    listContainer.innerHTML = filtered.map(m => {  
        const expDate = new Date(m.expiry);  
        const monthsToExp = (expDate - today) / (1000 * 60 * 60 * 24 * 30);  
          
        // Default Style (In Stock)  
        let bgColor = "#ffffff";   
        let borderColor = "#e2e8f0";

function saveMedicine() {

        qty,
