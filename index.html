<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pharmacy Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #F3F8F5; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .active-tab { color: #065F46; }
        .active-tab i { color: #065F46; background: #D1FAE5; padding: 8px; border-radius: 12px; }
    </style>
</head>
<body class="text-slate-800">

    <div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative overflow-x-hidden">
        <header class="p-4 flex justify-between items-center bg-white shadow-sm">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-800 p-2 rounded-lg text-white">
                    <i class="fas fa-prescription-bottle-medical"></i>
                </div>
                <h1 class="font-bold text-lg">Pharmacy Manager Pro</h1>
            </div>
            <button onclick="location.reload()" class="text-slate-400"><i class="fas fa-rotate"></i></button>
        </header>

        <main id="main-content" class="p-4 space-y-4 hide-scroll"></main>

        <nav class="fixed bottom-0 w-full max-w-md glass-nav border-t border-slate-100 flex justify-around py-3 px-2 z-50">
            <button onclick="renderDashboard()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-dash">
                <i class="fas fa-grid-2"></i><span class="text-[10px] font-medium">Dashboard</span>
            </button>
            <button onclick="renderInventory()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-inv">
                <i class="fas fa-box-archive"></i><span class="text-[10px] font-medium">Inventory</span>
            </button>
            <button onclick="renderSales()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-sales">
                <i class="fas fa-cash-register"></i><span class="text-[10px] font-medium">Sales</span>
            </button>
            <button onclick="renderCustomers()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-cust">
                <i class="fas fa-users"></i><span class="text-[10px] font-medium">Customers</span>
            </button>
            <button onclick="renderReports()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-rep">
                <i class="fas fa-chart-pie"></i><span class="text-[10px] font-medium">Reports</span>
            </button>
        </nav>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('pharma_v3_inv')) || [];
        let sales = JSON.parse(localStorage.getItem('pharma_v3_sales')) || [];
        let expenses = JSON.parse(localStorage.getItem('pharma_v3_exp')) || [];
        
        const save = () => {
            localStorage.setItem('pharma_v3_inv', JSON.stringify(inventory));
            localStorage.setItem('pharma_v3_sales', JSON.stringify(sales));
            localStorage.setItem('pharma_v3_exp', JSON.stringify(expenses));
        };

        const setNav = (id) => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
        };

        // --- DASHBOARD ---
        function renderDashboard() {
            setNav('nav-dash');
            const today = new Date().toISOString().split('T')[0];
            const tSales = sales.filter(s => s.date === today).reduce((a, b) => a + b.total, 0);
            const lowStockCount = inventory.filter(m => m.qty < 10).length;

            document.getElementById('main-content').innerHTML = `
                <div class="bg-orange-50 border border-orange-100 p-4 rounded-2xl flex gap-3">
                    <div class="bg-orange-100 text-orange-600 w-10 h-10 rounded-full flex items-center justify-center">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-orange-800 text-sm">Stock Alert</h4>
                        <p class="text-xs text-orange-700">${lowStockCount} medicines low stock.</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">
                        <p class="text-3xl font-bold">${inventory.length}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Total Items</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">
                        <p class="text-3xl font-bold text-blue-600">₹${tSales}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Today's Sale</p>
                    </div>
                </div>
                
                <h3 class="font-bold text-slate-600 mt-4">Inventory Status</h3>
                <div class="space-y-2">
                    ${inventory.slice(0, 5).map(m => `
                        <div class="bg-white p-3 rounded-xl flex justify-between border border-slate-50">
                            <div><p class="font-bold text-sm">${m.name}</p><p class="text-[10px] text-slate-400">Stock: ${m.qty}</p></div>
                            <p class="font-bold text-emerald-700">₹${m.rate}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // --- INVENTORY (NEWLY ADDED) ---
        function renderInventory() {
            setNav('nav-inv');
            document.getElementById('main-content').innerHTML = `
                <div class="bg-white p-5 rounded-2xl shadow-sm space-y-3">
                    <h3 class="font-bold">Add New Medicine</h3>
                    <input id="invName" placeholder="Medicine Name" class="w-full bg-slate-50 p-3 rounded-xl text-sm">
                    <div class="flex gap-2">
                        <input id="invQty" type="number" placeholder="Qty" class="flex-1 bg-slate-50 p-3 rounded-xl text-sm">
                        <input id="invRate" type="number" placeholder="Rate" class="flex-1 bg-slate-50 p-3 rounded-xl text-sm">
                    </div>
                    <button onclick="addMedicine()" class="w-full bg-emerald-800 text-white p-3 rounded-xl font-bold">Add to Stock</button>
                </div>

                <div class="space-y-2 mt-4">
                    <h3 class="font-bold px-1">All Medicines</h3>
                    ${inventory.map(m => `
                        <div class="bg-white p-3 rounded-xl flex justify-between items-center shadow-sm">
                            <div>
                                <p class="font-bold text-sm">${m.name}</p>
                                <p class="text-xs text-slate-500">Stock: ${m.qty} | Rate: ₹${m.rate}</p>
                            </div>
                            <button onclick="deleteMed(${m.id})" class="text-rose-400 p-2"><i class="fas fa-trash"></i></button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function addMedicine() {
            const name = document.getElementById('invName').value;
            const qty = parseInt(document.getElementById('invQty').value);
            const rate = parseFloat(document.getElementById('invRate').value);
            if(!name || !qty || !rate) return alert("Fill all details");
            
            inventory.push({ id: Date.now(), name, qty, rate });
            save();
            renderInventory();
        }

        function deleteMed(id) {
            inventory = inventory.filter(m => m.id !== id);
            save();
            renderInventory();
        }

        // --- SALES ---
        let cart = [];
        function renderSales() {
            setNav('nav-sales');
            document.getElementById('main-content').innerHTML = `
                <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4">
                    <h3 class="font-bold">New Sale</h3>
                    <input id="cName" placeholder="Customer Name" class="w-full bg-slate-50 p-3 rounded-xl text-sm">
                    <div class="flex gap-2">
                        <select id="medSelect" class="flex-1 bg-slate-50 p-3 rounded-xl text-sm">
                            <option value="">Select medicine</option>
                            ${inventory.map(m => `<option value="${m.id}">${m.name} (${m.qty})</option>`).join('')}
                        </select>
                        <input id="medQty" type="number" placeholder="Qty" class="w-20 bg-slate-50 p-3 rounded-xl text-sm">
                        <button onclick="addToCart()" class="bg-emerald-800 text-white px-4 rounded-xl"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="cartItems" class="space-y-2 border-t pt-3 min-h-[50px]">Cart is empty</div>
                    <div class="flex justify-between font-bold text-lg pt-2 border-t">
                        <span>Total:</span><span id="totalAmt">₹0.00</span>
                    </div>
                    <button onclick="confirmSale()" class="w-full bg-emerald-800 text-white p-4 rounded-xl font-bold shadow-lg">Confirm & Save</button>
                </div>
            `;
            updateCartUI();
        }

        function addToCart() {
            const mid = document.getElementById('medSelect').value;
            const qty = parseInt(document.getElementById('medQty').value);
            const med = inventory.find(m => m.id == mid);
            if(!med || !qty || qty > med.qty) return alert("Invalid Qty or Out of Stock");
            
            cart.push({ id: med.id, name: med.name, qty: qty, rate: med.rate, total: med.rate * qty });
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            if(cart.length === 0) { container.innerHTML = "Cart is empty"; return; }
            container.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between text-sm">
                    <span>${item.name} (x${item.qty})</span>
                    <b>₹${item.total}</b>
                </div>
            `).join('');
            const total = cart.reduce((a,b) => a + b.total, 0);
            document.getElementById('totalAmt').innerText = `₹${total.toFixed(2)}`;
        }

        function confirmSale() {
            if(cart.length === 0) return;
            const sale = {
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                customer: document.getElementById('cName').value || "Walk-in",
                total: cart.reduce((a,b) => a + b.total, 0),
                items: [...cart],
                payment: "Cash"
            };
            sales.push(sale);
            cart.forEach(item => {
                let med = inventory.find(m => m.id === item.id);
                if(med) med.qty -= item.qty;
            });
            cart = [];
            save();
            renderDashboard();
        }

        // --- CUSTOMERS (NEWLY ADDED) ---
        function renderCustomers() {
            setNav('nav-cust');
            // Extract unique customers from sales
            const uniqueCust = [...new Set(sales.map(s => s.customer))];
            document.getElementById('main-content').innerHTML = `
                <h3 class="font-bold px-1">Recent Customers</h3>
                <div class="space-y-2">
                    ${uniqueCust.length ? uniqueCust.map(c => `
                        <div class="bg-white p-4 rounded-2xl flex items-center gap-3 shadow-sm border border-slate-50">
                            <div class="bg-emerald-100 text-emerald-700 w-10 h-10 rounded-full flex items-center justify-center font-bold">
                                ${c[0].toUpperCase()}
                            </div>
                            <div>
                                <p class="font-bold text-sm">${c}</p>
                                <p class="text-[10px] text-slate-400">Regular Customer</p>
                            </div>
                        </div>
                    `).join('') : '<p class="text-center text-slate-400 py-10">No customer records found</p>'}
                </div>
            `;
        }

        // --- REPORTS ---
        function renderReports() {
            setNav('nav-rep');
            const totalSalesAmt = sales.reduce((a, b) => a + b.total, 0);
            const totalExpAmt = expenses.reduce((a, b) => a + b.amt, 0);
            
            document.getElementById('main-content').innerHTML = `
                <div class="bg-white p-5 rounded-2xl shadow-sm mb-4">
                    <h3 class="font-bold mb-4">Financial Summary</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between"><span>Total Revenue:</span><span class="text-emerald-600 font-bold">₹${totalSalesAmt}</span></div>
                        <div class="flex justify-between"><span>Total Expenses:</span><span class="text-rose-600 font-bold">₹${totalExpAmt}</span></div>
                        <div class="flex justify-between border-t pt-2 font-black text-lg"><span>Net Profit:</span><span>₹${totalSalesAmt - totalExpAmt}</span></div>
                    </div>
                </div>
                
                <div class="bg-white p-4 rounded-2xl shadow-sm">
                    <h3 class="font-bold mb-2">Add Expense</h3>
                    <div class="flex gap-2">
                        <input id="expName" placeholder="Rent/Light bill" class="flex-1 bg-slate-50 p-3 rounded-xl text-sm">
                        <input id="expAmt" type="number" placeholder="Amt" class="w-24 bg-slate-50 p-3 rounded-xl text-sm">
                        <button onclick="addExpense()" class="bg-rose-600 text-white px-4 rounded-xl"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            `;
        }

        function addExpense() {
            const name = document.getElementById('expName').value;
            const amt = parseFloat(document.getElementById('expAmt').value);
            if(!name || !amt) return;
            expenses.push({ name, amt, date: new Date().toISOString() });
            save();
            renderReports();
        }

        // Initialize App
        if(inventory.length === 0) {
            inventory = [
                {id: 1, name: 'Paracetamol 500mg', qty: 120, rate: 2.50},
                {id: 2, name: 'Amoxicillin 250mg', qty: 7, rate: 8.00}
            ];
            save();
        }
        renderDashboard();
    </script>
</body>
</html>
