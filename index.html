<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Pharmacy Manager Pro</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">  
    <style>  
        body { background-color: #F3F8F5; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }  
        .hide-scroll::-webkit-scrollbar { display: none; }  
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }  
        .active-tab { color: #065F46; }  
        .active-tab i { color: #065F46; background: #D1FAE5; padding: 8px; border-radius: 12px; }  
    </style>  
</head>  
<body class="text-slate-800">  
<div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative overflow-x-hidden">  
    <header class="p-4 flex justify-between items-center bg-white shadow-sm">  
        <div class="flex items-center gap-2">  
            <div class="bg-emerald-800 p-2 rounded-lg text-white">  
                <i class="fas fa-prescription-bottle-medical"></i>  
            </div>  
            <h1 class="font-bold text-lg">Pharmacy Manager Pro</h1>  
        </div>  
        <button onclick="location.reload()" class="text-slate-400"><i class="fas fa-rotate"></i></button>  
    </header>  

    <main id="main-content" class="p-4 space-y-4 hide-scroll"></main>  

    <nav class="fixed bottom-0 w-full max-w-md glass-nav border-t border-slate-100 flex justify-around py-3 px-2 z-50">  
        <button onclick="renderDashboard()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-dash">  
            <i class="fas fa-th-large"></i><span class="text-[10px] font-medium">Dashboard</span>  
        </button>  
        <button onclick="renderInventory()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-inv">  
            <i class="fas fa-box-archive"></i><span class="text-[10px] font-medium">Inventory</span>  
        </button>  
        <button onclick="renderSales()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-sales">  
            <i class="fas fa-cash-register"></i><span class="text-[10px] font-medium">Sales</span>  
        </button>  
        <button onclick="renderCustomers()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-cust">  
            <i class="fas fa-users"></i><span class="text-[10px] font-medium">Customers</span>  
        </button>  
        <button onclick="renderReports()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-rep">  
            <i class="fas fa-chart-pie"></i><span class="text-[10px] font-medium">Reports</span>  
        </button>  
    </nav>  
</div>  

<script>  
    let inventory = JSON.parse(localStorage.getItem('pharma_v3_inv')) || [];  
    let sales = JSON.parse(localStorage.getItem('pharma_v3_sales')) || [];  
    let expenses = JSON.parse(localStorage.getItem('pharma_v3_exp')) || [];  
      
    const save = () => {  
        localStorage.setItem('pharma_v3_inv', JSON.stringify(inventory));  
        localStorage.setItem('pharma_v3_sales', JSON.stringify(sales));  
        localStorage.setItem('pharma_v3_exp', JSON.stringify(expenses));  
    };  

    const setNav = (id) => {  
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));  
        document.getElementById(id).classList.add('active-tab');  
    };  

    function renderDashboard() {  
        setNav('nav-dash');  
        const today = new Date().toISOString().split('T')[0];  
        const tSales = sales.filter(s => s.date === today).reduce((a, b) => a + b.total, 0);  
        const lowStockCount = inventory.filter(m => m.qty < 10).length;  

        document.getElementById('main-content').innerHTML = `  
            <div class="bg-orange-50 border border-orange-100 p-4 rounded-2xl flex gap-3">  
                <div class="bg-orange-100 text-orange-600 w-10 h-10 rounded-full flex items-center justify-center"><i class="fas fa-bell"></i></div>  
                <div>  
                    <h4 class="font-bold text-orange-800 text-sm">Stock alert!</h4>  
                    <p class="text-xs text-orange-700">${lowStockCount} medicines low stock.</p>  
                </div>  
            </div>  
            <div class="grid grid-cols-2 gap-3">  
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">  
                    <p class="text-3xl font-bold">${inventory.length}</p>  
                    <p class="text-xs text-slate-400 font-medium uppercase">Medicines</p>  
                </div>  
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">  
                    <p class="text-3xl font-bold text-blue-600">₹${tSales}</p>  
                    <p class="text-xs text-slate-400 font-medium uppercase">Today's Sales</p>  
                </div>  
            </div>  
        `;  
    }  

    // --- SALES SECTION ---  
    let cart = [];  
    function renderSales() {  
        setNav('nav-sales');  
        document.getElementById('main-content').innerHTML = `  
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-50 space-y-4">  
                <h3 class="font-bold flex items-center gap-2"><i class="fas fa-user-circle text-emerald-800"></i> Customer Info</h3>  
                <input id="cName" placeholder="Name" class="w-full bg-slate-50 p-4 rounded-xl text-sm outline-none">  
                <input id="cMob" placeholder="Mobile" class="w-full bg-slate-50 p-4 rounded-xl text-sm outline-none">  
                <div class="grid grid-cols-2 gap-3">  
                     <input id="saleDate" type="date" value="${new Date().toISOString().split('T')[0]}" class="bg-slate-50 p-3 rounded-xl font-bold text-sm outline-none">  
                     <select id="payMode" class="bg-slate-50 p-3 rounded-xl font-bold text-sm outline-none">  
                        <option value="Cash">Cash</option><option value="Online">Online</option>  
                     </select>  
                </div>  
            </div>  

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-50">  
                <h3 class="font-bold flex items-center gap-2 mb-4" id="cartHeaderLabel"><i class="fas fa-cart-shopping text-emerald-800"></i> Medicine Cart</h3>  
                <div class="flex gap-2 mb-4">  
                    <select id="medSelect" class="flex-1 bg-slate-50 p-3 rounded-xl text-sm border-none outline-none ring-1 ring-slate-100">  
                        <option value="">Select medicine</option>  
                        ${inventory.filter(m => m.qty > 0).map(m => `<option value="${m.id}">${m.name} (Stock: ${m.qty})</option>`).join('')}  
                    </select>  
                    <input id="medQty" type="number" placeholder="Qty" class="w-20 bg-slate-50 p-3 rounded-xl text-sm outline-none ring-1 ring-slate-100">  
                    <button onclick="addToCart()" class="bg-emerald-800 text-white px-5 rounded-xl"><i class="fas fa-plus"></i></button> 
                </div>
                <div id="cartItems" class="space-y-3 py-4 border-t border-slate-100 min-h-[50px]"></div>  
                <div class="bg-emerald-50 p-4 rounded-xl flex justify-between items-center mt-4">  
                    <span class="font-bold text-emerald-900">Total Amount</span>  
                    <span class="text-xl font-black text-emerald-800" id="totalAmt">₹0.00</span>  
                </div>  
                <button onclick="confirmSale()" class="w-full bg-emerald-800 text-white p-4 rounded-2xl mt-4 font-bold flex items-center justify-center gap-2 shadow-lg">  
                    <i class="fas fa-check-circle"></i> Confirm Sale  
                </button>
            </div>  
        `;  
        updateCartUI(); 
    }  

    function addToCart() {
        const mid = document.getElementById('medSelect').value;
        const qtyInput = parseInt(document.getElementById('medQty').value);
        const med = inventory.find(m => m.id == mid);

        if(!med || qtyInput <= 0 || isNaN(qtyInput)) {
            alert("Select medicine and enter valid quantity");
            return;
        }

        let existing = cart.find(item => item.id == mid);
        let currentInCart = existing ? existing.qty : 0;

        // Check if enough stock exists
        if(med.qty < (currentInCart + qtyInput)) {
            alert(`Stock limit! Sirf ${med.qty} available hain (Already in cart: ${currentInCart})`);
            return;
        }

        if(existing) {
            existing.qty += qtyInput;
            existing.total = existing.qty * existing.rate;
        } else {
            cart.push({ id: med.id, name: med.name, qty: qtyInput, rate: med.rate, total: med.rate * qtyInput });
        }
        document.getElementById('medQty').value = "";
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        if(!container) return;

        const header = document.getElementById('cartHeaderLabel');
        let count = cart.reduce((a, b) => a + b.qty, 0);
        header.innerHTML = `<i class="fas fa-cart-shopping text-emerald-800"></i> Medicine Cart ${count > 0 ? `<span class="ml-auto bg-emerald-100 text-emerald-800 text-[10px] px-2 py-0.5 rounded-full font-bold">${count} items</span>` : ''}`;

        if(cart.length === 0) {
            container.innerHTML = `<p class="text-center text-slate-400 text-xs italic">No items added yet</p>`;
            document.getElementById('totalAmt').innerText = "₹0.00";
            return;
        }

        container.innerHTML = cart.map((item, i) => `
            <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                <div class="w-1/3"><p class="font-bold text-sm">${item.name}</p><p class="text-[10px] text-slate-400">₹${item.rate}/u</p></div>
                <div class="w-1/3 flex justify-center">
                    <div class="flex items-center bg-slate-50 rounded-lg px-2 py-1 gap-2 border">
                        <button onclick="updateCartQty(${i}, -1)" class="text-emerald-600 px-1"><i class="fas fa-minus text-[10px]"></i></button>
                        <span class="font-bold text-xs">${item.qty}</span>
                        <button onclick="updateCartQty(${i}, 1)" class="text-emerald-600 px-1"><i class="fas fa-plus text-[10px]"></i></button>
                    </div>
                </div>
                <div class="w-1/3 text-right flex items-center justify-end gap-2">
                    <span class="font-bold text-emerald-800">₹${item.total.toFixed(2)}</span>
                    <button onclick="cart.splice(${i},1);updateCartUI()" class="text-rose-400"><i class="fas fa-times"></i></button>
                </div>
            </div>
        `).join('');
        document.getElementById('totalAmt').innerText = `₹${cart.reduce((a, b) => a + b.total, 0).toFixed(2)}`;
    }

    function updateCartQty(index, change) {
        const item = cart[index];
        const med = inventory.find(m => m.id == item.id);

        if (change > 0 && item.qty + change > med.qty) {
            alert("Isse zyada stock nahi hai!");
            return;
        }

        if (item.qty + change > 0) {
            item.qty += change;
            item.total = item.qty * item.rate;
        } else {
            cart.splice(index, 1);
        }
        updateCartUI();
    }

    function confirmSale() {
        if(cart.length === 0) return alert("Cart empty hai!");
        const newSale = {
            id: Date.now(),
            date: document.getElementById('saleDate').value,
            name: document.getElementById('cName').value || "Walk-in Customer",
            mobile: document.getElementById('cMob').value || "N/A",
            items: [...cart],
            total: cart.reduce((a, b) => a + b.total, 0),
            payment: document.getElementById('payMode').value
        };
        sales.push(newSale);
        cart.forEach(item => { 
            let med = inventory.find(m => m.id == item.id); 
            if(med) med.qty -= item.qty; 
        });
        cart = []; save(); renderDashboard();
        alert("Sale successful!");
    }

    // --- INVENTORY ---
    function renderInventory() {
        setNav('nav-inv');
        document.getElementById('main-content').innerHTML = `
            <div class="bg-white p-5 rounded-2xl shadow-sm space-y-3 mb-4">
                <h3 class="font-bold text-emerald-900"><i class="fas fa-plus-circle"></i> Add New Stock</h3>
                <input id="invName" placeholder="Medicine Name" class="w-full bg-slate-50 p-3 rounded-xl text-sm outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <input id="invRate" type="number" placeholder="Price" class="bg-slate-50 p-3 rounded-xl text-sm outline-none">
                    <input id="invQty" type="number" placeholder="Qty" class="bg-slate-50 p-3 rounded-xl text-sm outline-none">
                </div>
                <button onclick="saveMedicine()" class="w-full bg-emerald-800 text-white p-3 rounded-xl font-bold">Save</button>
            </div>
            <div id="inv-list" class="space-y-2"></div>
        `;
        drawInvList();
    }

    function drawInvList() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inventory.map(m => `
            <div class="bg-white p-4 rounded-2xl flex justify-between items-center border">
                <div><p class="font-bold">${m.name}</p><p class="text-xs text-slate-400">Price: ₹${m.rate}</p></div>
                <div class="text-right">
                    <p class="font-bold ${m.qty < 10 ? 'text-rose-500' : 'text-emerald-600'}">${m.qty} left</p>
                    <button onclick="deleteMed(${m.id})" class="text-rose-400 text-xs"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }

    function saveMedicine() {
        const name = document.getElementById('invName').value;
        const rate = parseFloat(document.getElementById('invRate').value);
        const qty = parseInt(document.getElementById('invQty').value);
        if(!name || isNaN(rate) || isNaN(qty)) return alert("Sari details bharein");
        inventory.push({ id: Date.now(), name, rate, qty, expiry: '2028-01-01' });
        save(); renderInventory();
    }

    function deleteMed(id) { if(confirm("Delete?")) { inventory = inventory.filter(m => m.id !== id); save(); renderInventory(); } }

    function renderCustomers() {
        setNav('nav-cust');
        const uniqueCusts = [...new Map(sales.map(item => [item['mobile'], item])).values()];
        document.getElementById('main-content').innerHTML = `<h3 class="font-bold mb-4">Customers</h3><div class="space-y-2">${uniqueCusts.map(c => `<div class="bg-white p-4 rounded-xl border flex items-center gap-3"><div class="bg-blue-100 w-8 h-8 rounded-full flex items-center justify-center font-bold">${c.name[0]}</div><div><p class="font-bold text-sm">${c.name}</p><p class="text-xs text-slate-400">${c.mobile}</p></div></div>`).join('')}</div>`;
    }

    function renderReports() {
        setNav('nav-rep');
        const total = sales.reduce((a, b) => a + b.total, 0);
        document.getElementById('main-content').innerHTML = `<div class="bg-white p-6 rounded-3xl text-center border"><p class="text-slate-400 text-sm">Total Business</p><h2 class="text-4xl font-black text-emerald-800">₹${total.toFixed(2)}</h2></div>`;
    }

    // Initial Data
    if(inventory.length === 0) {
        inventory = [{id: 1, name: 'Paracetamol 500mg', qty: 10, rate: 5.00, expiry: '2028-01-01'}];
        save();
    }

    renderDashboard();
</script>
</body>
</html>
