<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pharmacy Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #F3F8F5; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .active-tab { color: #065F46 !important; }
        .active-tab i { color: #065F46; background: #D1FAE5; padding: 8px; border-radius: 12px; }
        input[type="date"]::-webkit-inner-spin-button,
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    </style>
</head>
<body class="text-slate-800">

    <div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative overflow-x-hidden">
        <header class="p-4 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-800 p-2 rounded-lg text-white">
                    <i class="fas fa-prescription-bottle-medical"></i>
                </div>
                <h1 class="font-bold text-lg">Pharmacy Manager Pro</h1>
            </div>
            <button onclick="location.reload()" class="text-slate-400"><i class="fas fa-rotate"></i></button>
        </header>

        <main id="main-content" class="p-4 space-y-4 hide-scroll"></main>

        <nav class="fixed bottom-0 w-full max-w-md glass-nav border-t border-slate-100 flex justify-around py-3 px-2 z-50">
            <button onclick="renderDashboard()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-dash">
                <i class="fas fa-house"></i><span class="text-[10px] font-medium">Dashboard</span>
            </button>
            <button onclick="renderInventory()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-inv">
                <i class="fas fa-box-archive"></i><span class="text-[10px] font-medium">Inventory</span>
            </button>
            <button onclick="renderSales()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-sales">
                <i class="fas fa-cash-register"></i><span class="text-[10px] font-medium">Sales</span>
            </button>
            <button onclick="renderCustomers()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-cust">
                <i class="fas fa-users"></i><span class="text-[10px] font-medium">Customers</span>
            </button>
            <button onclick="renderReports()" class="nav-btn flex flex-col items-center gap-1 text-slate-400" id="nav-rep">
                <i class="fas fa-chart-line"></i><span class="text-[10px] font-medium">Reports</span>
            </button>
        </nav>
    </div>

    <script>
        // Data Persistence
        let inventory = JSON.parse(localStorage.getItem('pharma_v4_inv')) || [];
        let sales = JSON.parse(localStorage.getItem('pharma_v4_sales')) || [];
        let expenses = JSON.parse(localStorage.getItem('pharma_v4_exp')) || [];
        let cart = [];

        const save = () => {
            localStorage.setItem('pharma_v4_inv', JSON.stringify(inventory));
            localStorage.setItem('pharma_v4_sales', JSON.stringify(sales));
            localStorage.setItem('pharma_v4_exp', JSON.stringify(expenses));
        };

        const setNav = (id) => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            window.scrollTo(0,0);
        };

        // --- DASHBOARD ---
        function renderDashboard() {
            setNav('nav-dash');
            const today = new Date().toISOString().split('T')[0];
            const tSalesAmt = sales.filter(s => s.date === today).reduce((a, b) => a + b.total, 0);
            const lowStockCount = inventory.filter(m => m.qty < 10).length;

            document.getElementById('main-content').innerHTML = `
                <div class="bg-orange-50 border border-orange-100 p-4 rounded-2xl flex gap-3">
                    <div class="bg-orange-100 text-orange-600 w-10 h-10 rounded-full flex items-center justify-center"><i class="fas fa-bell"></i></div>
                    <div>
                        <h4 class="font-bold text-orange-800 text-sm">Stock khatam hone wala hai!</h4>
                        <p class="text-xs text-orange-700">${lowStockCount} items low stock. Check inventory.</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">
                        <p class="text-3xl font-bold">${inventory.length}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Total Medicines</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">
                        <p class="text-3xl font-bold text-orange-600">${lowStockCount}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Low Stock</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">
                        <p class="text-3xl font-bold text-emerald-700">₹${tSalesAmt}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Today's Sales</p>
                    </div>
                </div>
                
                <h3 class="font-bold text-slate-600 mt-4">Today's Transactions</h3>
                <div class="space-y-2">
                    ${sales.filter(s => s.date === today).map(s => `
                        <div class="bg-white p-3 rounded-xl flex justify-between items-center border border-slate-50 shadow-sm">
                            <div><p class="font-bold text-sm">${s.name}</p><p class="text-[10px] text-slate-400">${s.items.length} item(s) • ${s.payment}</p></div>
                            <p class="font-bold text-emerald-700">₹${s.total}</p>
                        </div>
                    `).join('') || '<p class="text-center text-slate-400 py-4">No sales recorded today.</p>'}
                </div>
            `;
        }

        // --- INVENTORY ---
        function renderInventory() {
            setNav('nav-inv');
            document.getElementById('main-content').innerHTML = `
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold">Inventory</h2>
                    <button onclick="addMedicinePrompt()" class="bg-emerald-800 text-white px-4 py-2 rounded-xl text-xs font-bold">+ Add Medicine</button>
                </div>
                <div class="space-y-3">
                    ${inventory.map(m => `
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="font-bold text-slate-800">${m.name}</h4>
                                    <p class="text-[10px] text-slate-400 mb-2">${m.composition || 'No Composition'}</p>
                                    <div class="flex gap-2">
                                        <span class="bg-slate-50 text-slate-600 px-2 py-1 rounded text-[10px]">Qty: ${m.qty}</span>
                                        <span class="bg-slate-50 text-slate-600 px-2 py-1 rounded text-[10px]">₹${m.rate}/unit</span>
                                        <span class="bg-slate-50 text-slate-600 px-2 py-1 rounded text-[10px]">Exp: ${m.expiry}</span>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="editMed(${m.id})" class="text-blue-500"><i class="fas fa-edit"></i></button>
                                    <button onclick="deleteMed(${m.id})" class="text-rose-500"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    `).join('') || '<p class="text-center text-slate-400 py-10">Inventory is empty.</p>'}
                </div>
            `;
        }

        function addMedicinePrompt() {
            const name = prompt("Medicine Name:");
            if(!name) return;
            const comp = prompt("Composition:");
            const qty = parseInt(prompt("Quantity:"));
            const rate = parseFloat(prompt("Rate per unit:"));
            const expiry = prompt("Expiry (YYYY-MM-DD):");
            inventory.push({ id: Date.now(), name, composition: comp, qty, rate, expiry });
            save(); renderInventory();
        }

        // --- SALES (NEW SALE & HISTORY) ---
        let currentTab = 'new';
        function renderSales() {
            setNav('nav-sales');
            const activeClass = "border-b-2 border-emerald-800 text-emerald-800";
            document.getElementById('main-content').innerHTML = `
                <div class="flex gap-8 border-b border-slate-200 mb-4 px-2">
                    <button onclick="currentTab='new';renderSales()" class="pb-2 font-bold text-sm ${currentTab==='new'?activeClass:'text-slate-400'}">New Sale</button>
                    <button onclick="currentTab='history';renderSales()" class="pb-2 font-bold text-sm ${currentTab==='history'?activeClass:'text-slate-400'}">Sales History</button>
                </div>
                <div id="sales-sub-content"></div>
            `;
            if(currentTab === 'new') renderNewSale(); else renderSalesHistory();
        }

        function renderNewSale() {
            document.getElementById('sales-sub-content').innerHTML = `
                <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4 mb-4">
                    <h3 class="font-bold text-sm text-slate-400 uppercase">Customer Information</h3>
                    <input id="sName" placeholder="Customer Name (Optional)" class="w-full bg-slate-50 p-4 rounded-xl text-sm border-none">
                    <input id="sMob" placeholder="Mobile Number (Optional)" class="w-full bg-slate-50 p-4 rounded-xl text-sm border-none">
                    <input id="sAddr" placeholder="Address (Optional)" class="w-full bg-slate-50 p-4 rounded-xl text-sm border-none">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-slate-50 p-3 rounded-xl">
                            <p class="text-[10px] text-slate-400 uppercase">Sale Date</p>
                            <input type="date" id="sDate" value="${new Date().toISOString().split('T')[0]}" class="bg-transparent font-bold text-sm w-full outline-none">
                        </div>
                        <div class="bg-slate-50 p-3 rounded-xl">
                            <p class="text-[10px] text-slate-400 uppercase">Payment</p>
                            <select id="sPay" class="bg-transparent font-bold text-sm w-full outline-none">
                                <option value="Cash">Cash</option>
                                <option value="Online">Online</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4">
                    <h3 class="font-bold text-sm text-slate-400 uppercase">Medicine Cart</h3>
                    <div class="flex gap-2">
                        <select id="sMedId" class="flex-1 bg-slate-50 p-3 rounded-xl text-sm border-none">
                            <option value="">Select Medicine</option>
                            ${inventory.map(m => `<option value="${m.id}">${m.name} (${m.qty} left)</option>`).join('')}
                        </select>
                        <input id="sQty" type="number" placeholder="Qty" class="w-20 bg-slate-50 p-3 rounded-xl text-sm border-none">
                        <button onclick="addItemToCart()" class="bg-emerald-800 text-white px-4 rounded-xl"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="cart-list" class="space-y-3 py-4 border-y border-slate-50"></div>
                    <div class="flex justify-between font-bold text-lg px-2">
                        <span>Total Bill</span>
                        <span class="text-emerald-800" id="cart-total">₹0.00</span>
                    </div>
                    <button onclick="confirmTransaction()" class="w-full bg-emerald-800 text-white p-4 rounded-2xl font-bold shadow-lg shadow-emerald-50">Confirm Sale</button>
                </div>
            `;
            updateCartUI();
        }

        function addItemToCart() {
            const id = document.getElementById('sMedId').value;
            const qty = parseInt(document.getElementById('sQty').value);
            const med = inventory.find(m => m.id == id);
            if(!med || !qty) return alert("Select medicine and quantity");
            if(qty > med.qty) return alert("Not enough stock!");

            cart.push({ id: med.id, name: med.name, qty, rate: med.rate, total: med.rate * qty });
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            if(!list) return;
            if(cart.length === 0) { list.innerHTML = `<p class="text-center text-slate-300 text-xs py-4">Cart is empty</p>`; return; }
            
            list.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center text-sm">
                    <div><p class="font-bold">${item.name}</p><p class="text-[10px] text-slate-400">${item.qty} x ₹${item.rate}</p></div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold">₹${item.total}</span>
                        <button onclick="cart.splice(${i},1);updateCartUI()" class="text-rose-500"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            `).join('');
            document.getElementById('cart-total').innerText = `₹${cart.reduce((a,b)=>a+b.total,0).toFixed(2)}`;
        }

        function confirmTransaction() {
            if(cart.length === 0) return alert("Add items to cart");
            const sale = {
                id: Date.now(),
                date: document.getElementById('sDate').value,
                name: document.getElementById('sName').value || "Guest",
                mobile: document.getElementById('sMob').value || "N/A",
                address: document.getElementById('sAddr').value || "N/A",
                items: [...cart],
                total: cart.reduce((a,b)=>a+b.total,0),
                payment: document.getElementById('sPay').value
            };
            sales.push(sale);
            cart.forEach(c => { let m = inventory.find(i=>i.id==c.id); if(m) m.qty -= c.qty; });
            cart = []; save(); renderDashboard(); alert("Sale Successful!");
        }

        function renderSalesHistory() {
            document.getElementById('sales-sub-content').innerHTML = `
                <div class="space-y-3">
                    ${sales.slice().reverse().map(s => `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50">
                            <div class="flex justify-between mb-2">
                                <span class="bg-emerald-50 text-emerald-700 px-2 py-1 rounded text-[10px] font-bold">${s.date}</span>
                                <span class="text-[10px] font-bold text-slate-400">${s.payment}</span>
                            </div>
                            <h4 class="font-bold text-sm">${s.name}</h4>
                            <div class="text-[10px] text-slate-500 mt-1">
                                ${s.items.map(i => `${i.name} (${i.qty})`).join(', ')}
                            </div>
                            <div class="mt-3 pt-2 border-t flex justify-between items-center">
                                <span class="font-bold text-emerald-800 text-sm">₹${s.total}</span>
                                <button onclick="deleteSale(${s.id})" class="text-rose-400 text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('') || '<p class="text-center text-slate-400 py-10">No history found.</p>'}
                </div>
            `;
        }

        function deleteSale(id) { if(confirm("Delete this record?")) { sales = sales.filter(s=>s.id!==id); save(); renderSales(); } }

        // --- CUSTOMERS ---
        function renderCustomers() {
            setNav('nav-cust');
            const uniqueCust = [];
            sales.forEach(s => {
                if(!uniqueCust.find(c => c.mobile === s.mobile)) {
                    uniqueCust.push({ name: s.name, mobile: s.mobile, address: s.address });
                }
            });

            document.getElementById('main-content').innerHTML = `
                <h2 class="text-xl font-bold mb-4">Customer Details</h2>
                <div class="space-y-3">
                    ${uniqueCust.map(c => `
                        <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                            <div class="flex items-center gap-3">
                                <div class="bg-emerald-50 text-emerald-700 w-10 h-10 rounded-full flex items-center justify-center font-bold">${c.name[0]}</div>
                                <div><p class="font-bold text-sm">${c.name}</p><p class="text-[10px] text-slate-400">${c.mobile}</p></div>
                            </div>
                            <button onclick="viewCustomerHistory('${c.mobile}')" class="text-emerald-600"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    `).join('') || '<p class="text-center text-slate-400 py-10">No customer records.</p>'}
                </div>
            `;
        }

        function viewCustomerHistory(mobile) {
            const hist = sales.filter(s => s.mobile === mobile);
            const user = hist[0];
            document.getElementById('main-content').innerHTML = `
                <button onclick="renderCustomers()" class="text-emerald-700 font-bold text-sm mb-4"><i class="fas fa-arrow-left mr-2"></i> Back</button>
                <div class="bg-white p-6 rounded-3xl shadow-sm mb-4 text-center">
                    <div class="bg-emerald-50 text-emerald-700 w-16 h-16 rounded-full flex items-center justify-center font-bold text-2xl mx-auto mb-3">${user.name[0]}</div>
                    <h2 class="text-xl font-bold">${user.name}</h2>
                    <p class="text-sm text-slate-400">${user.mobile}</p>
                    <p class="text-xs text-slate-400 mt-1 italic">${user.address}</p>
                </div>
                <h3 class="font-bold mb-3">Purchase History</h3>
                <div class="space-y-3">
                    ${hist.map(s => `
                        <div class="bg-white p-4 rounded-2xl shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 mb-2">${s.date} • ${s.payment}</p>
                            ${s.items.map(i => `<div class="flex justify-between text-xs my-1"><span>${i.name} x ${i.qty}</span><b>₹${i.total}</b></div>`).join('')}
                            <div class="border-t mt-2 pt-2 text-right font-b
